<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="نبضة"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>نبضة Chat</title>
<link rel="preconnect" href="https://www.gstatic.com"/>
<link rel="preconnect" href="https://nabda-chat-default-rtdb.firebaseio.com"/>
<link rel="stylesheet" href="style.css"/>
<style>
#loading-screen{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .3s}
#loading-screen.hide{opacity:0;pointer-events:none}
#app{display:none}
</style>
<!-- Apply theme instantly before render to prevent flash -->
<script>
(function(){
  try{
    var dark=JSON.parse(localStorage.getItem('nabda_theme'));
    if(dark===null) dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    var bg=dark?'linear-gradient(160deg,#0a0a14,#0d0d1a)':'linear-gradient(160deg,#f0f4ff,#e8eeff)';
    document.write('<style>#loading-screen{background:'+bg+'}</style>');
  }catch(e){}
})();
</script>
</head>
<body>

<!-- شاشة التحميل — يُخفيها app.js بعد FB.init() -->
<div id="loading-screen">
  <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(99,102,241,.35)">💬</div>
  <div id="ls-title" style="font-size:22px;font-weight:800;letter-spacing:-0.5px">نبضة</div>
  <div style="width:36px;height:36px;border:3px solid #6366f1;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite"></div>
</div>

<!-- جذر التطبيق — يُظهره app.js -->
<div id="app"></div>
<div id="toast-host"></div>

<!--
  ═══════════════════════════════════════════════
  ترتيب السكربتات (مهم جداً)
  1. firebase.js  → window.FB
  2. auth.js      → window.Auth
  3. chat.js      → window.Chat
  4. friends.js   → window.Friends
  5. groups.js    → window.Groups
  6. stories.js   → window.Stories
  7. ui.js        → window.UI
  8. app.js       → التطبيق الرئيسي
  ═══════════════════════════════════════════════
-->
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/friends.js"></script>
<script src="js/groups.js"></script>
<script src="js/stories.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js" defer></script>

</body>
</html>
