<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<!-- Preconnect for speed -->
<link rel="preconnect" href="https://unpkg.com"/>
<link rel="preconnect" href="https://www.gstatic.com"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Segoe UI','Cairo',Tahoma,sans-serif;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
input:focus,textarea:focus{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#6366f144;border-radius:3px}
.tab{flex:1;padding:10px 4px;border:none;background:transparent;font-size:12px;font-family:inherit;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:600;transition:color .15s,border-color .15s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slideup{animation:slideUp .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
/* Pull to refresh */
.ptr-spinner{display:flex;align-items:center;justify-content:center;padding:10px;color:#6366f1;font-size:13px;gap:6px}
/* Story progress */
@keyframes storyProgress{from{width:0}to{width:100%}}
.story-bar{height:3px;background:#6366f144;border-radius:2px;overflow:hidden}
.story-bar-fill{height:100%;background:#fff;border-radius:2px}
/* Toast */
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.toast{animation:toastIn .25s ease}
.toast.out{animation:toastOut .25s ease forwards}
/* Spam cooldown */
@keyframes cooldown{from{width:100%}to{width:0%}}
/* Swipe hint */
.msg-item{transition:transform .15s}
</style>
</head>
<body>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#f0f4ff,#e8eeff);flex-direction:column;gap:14px">
  <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(99,102,241,.35)">💬</div>
  <div style="font-size:22px;font-weight:800;color:#6366f1;letter-spacing:-0.5px">نبضة</div>
  <div style="display:flex;gap:6px;margin-top:4px">${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:#6366f1;opacity:${0.3+i*0.35}"></div>`).join("")}</div>
</div></div>

<!-- Firebase first - async for speed -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,off,update,remove,serverTimestamp,onDisconnect}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBqRplVWgiZUXkbujiQ-KWNca6dPwC-kOk",authDomain:"nabda-chat.firebaseapp.com",databaseURL:"https://nabda-chat-default-rtdb.firebaseio.com",projectId:"nabda-chat",storageBucket:"nabda-chat.firebasestorage.app",messagingSenderId:"399164736455",appId:"1:399164736455:web:127df9589215b9e8120fe2"};
const app=initializeApp(cfg);const db=getDatabase(app);
window.__db=db;window.__fn={ref,set,get,push,onValue,off,update,remove,serverTimestamp,onDisconnect};
window.__fbReady=true;window.dispatchEvent(new Event('fbReady'));
</script>

<!-- React from CDN (production) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const{useState,useRef,useEffect,useCallback,memo,useMemo,useReducer}=React;

// ─── Helpers ───────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
const fmtFull=ts=>{const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return"الآن";if(diff<3600000)return`منذ ${Math.floor(diff/60000)} د`;if(diff<86400000)return fmt(ts);return d.toLocaleDateString("ar");};
const COLS=["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ef4444","#06b6d4"];
const uc=n=>n?COLS[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLS.length]:"#6366f1";
const ls=(k,fb)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ─── Firebase ──────────────────────────────────────────────
const D=()=>window.__db;const F=()=>window.__fn;
const dSet=(p,v)=>F().set(F().ref(D(),p),v);
const dUpd=(p,v)=>F().update(F().ref(D(),p),v);
const dPush=(p,v)=>F().push(F().ref(D(),p),v);
const dGet=async p=>{try{const s=await F().get(F().ref(D(),p));return s.exists()?s.val():null;}catch{return null;}};
const dListen=(p,cb)=>{const r=F().ref(D(),p);F().onValue(r,s=>cb(s.val()));return()=>F().off(r);};
const dDel=p=>F().remove(F().ref(D(),p));

// ─── Theme ─────────────────────────────────────────────────
const useTheme=()=>{
  const[dark,setDark]=useState(()=>{const s=ls("nabda_theme",null);return s!=null?s:window.matchMedia?.("(prefers-color-scheme:dark)").matches;});
  const toggle=()=>{const nd=!dark;setDark(nd);lsSet("nabda_theme",nd);};
  return{dark,toggle};
};
const T=dark=>({
  bg:dark?"#0a0a14":"#f0f2f5",card:dark?"#12121e":"#ffffff",card2:dark?"#1a1a2a":"#f8f9fa",
  border:dark?"#1e1e30":"#e5e7eb",text:dark?"#e0e0f0":"#1f2937",text2:dark?"#888":"#6b7280",
  text3:dark?"#555":"#9ca3af",inp:dark?"#1a1a2a":"#f3f4f6",inpBorder:dark?"#2a2a3e":"#d1d5db",
  bubble:dark?"#1e1e2e":"#e5e7eb",topbar:dark?"#12121e":"#ffffff",tabs:dark?"#12121e":"#ffffff",
});

// ─── Sound ─────────────────────────────────────────────────
let _ac=null;
const getAC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
const snd=t=>{try{const c=getAC();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
  if(t==="send"){o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(660,c.currentTime+0.08);g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);o.start();o.stop(c.currentTime+0.08);}
  else if(t==="recv"){o.type="sine";o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+0.1);g.gain.setValueAtTime(0.22,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.start();o.stop(c.currentTime+0.25);}
  else if(t==="notif"){o.frequency.setValueAtTime(784,c.currentTime);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start();o.stop(c.currentTime+0.3);}
}catch{}};

// ─── Notifications ─────────────────────────────────────────
const requestNotifPerm=async()=>{if("Notification"in window&&Notification.permission==="default")await Notification.requestPermission();};
const showNotif=(title,body,onClick)=>{
  if("Notification"in window&&Notification.permission==="granted"&&document.visibilityState==="hidden"){
    const n=new Notification(title,{body,icon:"icon.png",badge:"icon.png",tag:title});
    if(onClick)n.onclick=()=>{window.focus();n.close();onClick();};
  }
};

// ─── Toast ─────────────────────────────────────────────────
let _toastCb=null;
const toast=(msg,type="info",dur=2800)=>{if(_toastCb)_toastCb({msg,type,dur});};

const ToastHost=()=>{
  const[items,setItems]=useState([]);
  useEffect(()=>{_toastCb=({msg,type,dur})=>{const id=uid();setItems(p=>[...p,{id,msg,type}]);setTimeout(()=>setItems(p=>p.filter(x=>x.id!==id)),dur);};return()=>{_toastCb=null;};},[]);
  if(!items.length)return null;
  const colors={info:"#6366f1",success:"#22c55e",error:"#ef4444",warn:"#f59e0b"};
  return<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none"}}>
    {items.map(it=><div key={it.id} className="toast" style={{background:colors[it.type]||colors.info,color:"#fff",padding:"9px 18px",borderRadius:22,fontSize:13,fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,.22)",whiteSpace:"nowrap",maxWidth:"90vw",overflow:"hidden",textOverflow:"ellipsis"}}>{it.msg}</div>)}
  </div>;
};

// ─── Avatar ────────────────────────────────────────────────
const Av=memo(({user,size=36,onClick,ring=false,seen=false,online=false})=>{
  const name=user?.username||"?";const c=uc(name);
  const inner=user?.photo
    ?<img src={user.photo} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block"}} loading="lazy"/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${c}dd,${c}77)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:user?.emoji?size*.5:size*.4,fontWeight:800,color:"#fff",userSelect:"none",flexShrink:0}}>{user?.emoji||name[0]?.toUpperCase()||"?"}</div>;
  return(
    <div onClick={onClick} style={{cursor:onClick?"pointer":"default",flexShrink:0,position:"relative",display:"inline-flex"}}>
      {ring?<div style={{padding:2,borderRadius:"50%",border:`2.5px solid ${seen?"#aaa":"#6366f1"}`,display:"inline-flex"}}>{inner}</div>:inner}
      {online&&<div style={{position:"absolute",bottom:1,left:1,width:Math.max(8,size*.22),height:Math.max(8,size*.22),background:"#22c55e",borderRadius:"50%",border:"2px solid white",flexShrink:0}}/>}
    </div>
  );
});

// ─── Image Viewer ──────────────────────────────────────────
const ImgView=({src,onClose})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <img src={src} style={{maxWidth:"96vw",maxHeight:"88vh",objectFit:"contain",borderRadius:10}} onClick={e=>e.stopPropagation()}/>
    <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>✕</button>
  </div>
);

// ─── Story Viewer (enhanced with progress + swipe) ─────────
const StoryViewer=({stories,initialUser,users,me,onClose,onDelete,isOnline,fmtFull})=>{
  const userList=Object.keys(stories).filter(u=>stories[u]&&Object.keys(stories[u]).length>0);
  const initIdx=Math.max(0,userList.indexOf(initialUser));
  const[uIdx,setUIdx]=useState(initIdx);
  const[sIdx,setSIdx]=useState(0);
  const[progress,setProgress]=useState(0);
  const timerRef=useRef(null);
  const dur=5000;

  const curUser=userList[uIdx];
  const curStories=curUser?Object.entries(stories[curUser]||{}).sort((a,b)=>b[1].ts-a[1].ts):[];
  const curStory=curStories[sIdx];

  const next=useCallback(()=>{
    if(sIdx<curStories.length-1){setSIdx(s=>s+1);setProgress(0);}
    else if(uIdx<userList.length-1){setUIdx(u=>u+1);setSIdx(0);setProgress(0);}
    else onClose();
  },[sIdx,curStories.length,uIdx,userList.length,onClose]);

  const prev=()=>{
    if(sIdx>0){setSIdx(s=>s-1);setProgress(0);}
    else if(uIdx>0){setUIdx(u=>u-1);setSIdx(0);setProgress(0);}
  };

  useEffect(()=>{
    setProgress(0);
    clearInterval(timerRef.current);
    const step=100/(dur/50);
    timerRef.current=setInterval(()=>{
      setProgress(p=>{if(p>=100){clearInterval(timerRef.current);next();return 0;}return p+step;});
    },50);
    return()=>clearInterval(timerRef.current);
  },[uIdx,sIdx]);

  if(!curStory)return null;
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:999,display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
      {/* Progress bars */}
      <div style={{display:"flex",gap:3,padding:"10px 12px 6px",position:"absolute",top:0,left:0,right:0,zIndex:2}}>
        {curStories.map(([sid],i)=>(
          <div key={sid} className="story-bar" style={{flex:1}}>
            <div className="story-bar-fill" style={{width:i<sIdx?"100%":i===sIdx?`${progress}%`:"0%",transition:i===sIdx?"none":"none"}}/>
          </div>
        ))}
      </div>
      {/* Header */}
      <div style={{position:"absolute",top:22,left:0,right:0,zIndex:2,padding:"0 12px",display:"flex",alignItems:"center",gap:8}}>
        <Av user={users[curUser]} size={36} online={isOnline(curUser)}/>
        <div style={{flex:1}}><div style={{color:"#fff",fontWeight:700,fontSize:14}}>{curUser}</div><div style={{color:"#aaa",fontSize:11}}>{fmtFull(curStory[1].ts)}</div></div>
        {curUser===me&&<button onClick={()=>onDelete(curStory[0])} style={{background:"rgba(239,68,68,.25)",border:"none",color:"#ef4444",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🗑 حذف</button>}
        <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      {/* Story image */}
      <img src={curStory[1].data} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
      {/* Tap zones */}
      <div style={{position:"absolute",inset:0,display:"flex"}}>
        <div style={{flex:1}} onClick={prev}/>
        <div style={{flex:1}} onClick={next}/>
      </div>
    </div>
  );
};

// ─── Message Content ───────────────────────────────────────
const MsgContent=memo(({msg,onImg,th})=>{
  const[play,setPlay]=useState(false);const ar=useRef(null);
  if(msg.type==="image")return<img src={msg.data} style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block",cursor:"pointer"}} onClick={()=>onImg?.(msg.data)} loading="lazy"/>;
  if(msg.type==="video")return<video src={msg.data} controls playsInline style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block"}}/>;
  if(msg.type==="voice"){
    const tog=()=>{if(!ar.current)return;if(play){ar.current.pause();setPlay(false);}else{ar.current.play().catch(()=>{});setPlay(true);}};
    return<div style={{display:"flex",alignItems:"center",gap:10,minWidth:160}}>
      <audio ref={ar} src={msg.data} onEnded={()=>setPlay(false)}/>
      <button onClick={tog} style={{width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:"rgba(255,255,255,.2)",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{play?"⏸":"▶"}</button>
      <div style={{flex:1}}><div style={{fontSize:12,opacity:.8}}>رسالة صوتية</div>{msg.duration>0&&<div style={{fontSize:10,opacity:.5}}>{msg.duration}ث</div>}</div>
      <span style={{fontSize:20}}>🎙</span>
    </div>;
  }
  return<span style={{wordBreak:"break-word",lineHeight:1.55,whiteSpace:"pre-wrap"}}>{msg.text}</span>;
});

// ─── Bubble ────────────────────────────────────────────────
const Bubble=memo(({msg,me,isGroup,users,onImg,onAv,bubbleColor,th})=>{
  const mine=msg.sender===me;const sender=users[msg.sender]||{username:msg.sender};
  const isMedia=["image","video","voice"].includes(msg.type);
  const myBubble=bubbleColor||"linear-gradient(135deg,#6366f1,#8b5cf6)";
  return(
    <div className="fadein msg-item" style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:6,marginBottom:3,padding:"0 2px"}}>
      {!mine&&<Av user={sender} size={28} onClick={()=>onAv?.(msg.sender)}/>}
      <div style={{maxWidth:"78%"}}>
        {!mine&&isGroup&&<div style={{fontSize:10,color:uc(msg.sender),fontWeight:700,marginBottom:2,paddingRight:4}}>{msg.sender}</div>}
        <div style={{padding:isMedia?"5px":"9px 13px",borderRadius:mine?"18px 18px 4px 18px":"18px 18px 18px 4px",background:mine?myBubble:th.bubble,color:mine?"#fff":th.text,fontSize:14,lineHeight:1.5,boxShadow:mine?"0 2px 8px rgba(99,102,241,.25)":"0 1px 4px rgba(0,0,0,.08)"}}>
          <MsgContent msg={msg} onImg={onImg} th={th}/>
        </div>
        <div style={{fontSize:10,color:th.text3,marginTop:2,textAlign:mine?"left":"right",paddingRight:2}}>{fmt(msg.ts)}{mine&&<span style={{marginRight:3,opacity:.7}}>✓✓</span>}</div>
      </div>
    </div>
  );
});

// ─── Messages List with Pull-to-Refresh ───────────────────
const MsgList=memo(({msgs,me,isGroup,users,empty,onImg,onAv,typingUsers,chatBg,bubbleColor,th,onRefresh})=>{
  const bot=useRef(null);const pLen=useRef(0);
  const scrollRef=useRef(null);
  const[refreshing,setRefreshing]=useState(false);
  const touchStartY=useRef(0);

  useEffect(()=>{
    if(msgs.length!==pLen.current){bot.current?.scrollIntoView({behavior:msgs.length-pLen.current>3?"auto":"smooth"});pLen.current=msgs.length;}
  },[msgs.length]);

  const onTouchStart=e=>{if(scrollRef.current?.scrollTop===0)touchStartY.current=e.touches[0].clientY;};
  const onTouchEnd=async e=>{
    const dy=e.changedTouches[0].clientY-touchStartY.current;
    if(dy>60&&scrollRef.current?.scrollTop===0&&onRefresh&&!refreshing){
      setRefreshing(true);await onRefresh();setTimeout(()=>setRefreshing(false),800);
    }
  };

  return(
    <div ref={scrollRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{flex:1,overflowY:"auto",padding:"10px 10px 4px",background:chatBg||th.bg,backgroundSize:"cover",backgroundPosition:"center",WebkitOverflowScrolling:"touch"}}>
      {refreshing&&<div className="ptr-spinner"><div className="spin" style={{width:16,height:16,border:"2px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%"}}/>جاري التحديث...</div>}
      {msgs.length===0&&!refreshing&&empty}
      {msgs.map(m=><Bubble key={m.id||m.ts} msg={m} me={me} isGroup={isGroup} users={users} onImg={onImg} onAv={onAv} bubbleColor={bubbleColor} th={th}/>)}
      {typingUsers&&typingUsers.length>0&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
          {typingUsers.slice(0,2).map(u=><Av key={u} user={users[u]} size={22}/>)}
          <div style={{background:th.bubble,borderRadius:"12px 12px 12px 4px",padding:"8px 12px"}}>
            <div className="typing" style={{display:"flex",alignItems:"center",gap:2}}>
              <span style={{background:th.text2}}/><span style={{background:th.text2}}/><span style={{background:th.text2}}/>
            </div>
          </div>
        </div>
      )}
      <div ref={bot}/>
    </div>
  );
});

// ─── Chat Input with Spam Control ─────────────────────────
const SPAM_DELAY=1200; // ms between messages
const ChatInp=memo(({ph,onSend,onMedia,onTyping,th})=>{
  const[val,setVal]=useState("");const[mode,setMode]=useState("text");
  const[rec,setRec]=useState(false);const[rs,setRs]=useState(0);const[rd,setRd]=useState(null);
  const[cooldown,setCooldown]=useState(false);
  const mr=useRef(null);const tr=useRef(null);const rr=useRef(0);const typT=useRef(null);
  const ir=useRef(null);const vr=useRef(null);const lastSend=useRef(0);
  const cdTimer=useRef(null);

  const send=useCallback(()=>{
    if(!val.trim())return;
    const now=Date.now();
    if(now-lastSend.current<SPAM_DELAY){toast("لا تُرسل بسرعة كبيرة ⏳","warn");return;}
    lastSend.current=now;
    onSend(val.trim());setVal("");snd("send");onTyping?.(false);
    // show cooldown indicator briefly
    setCooldown(true);
    clearTimeout(cdTimer.current);
    cdTimer.current=setTimeout(()=>setCooldown(false),SPAM_DELAY);
  },[val,onSend,onTyping]);

  const onChange=e=>{
    setVal(e.target.value);
    if(onTyping){onTyping(true);clearTimeout(typT.current);typT.current=setTimeout(()=>onTyping(false),2500);}
  };
  const hImg=e=>{const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024)return toast("الحجم الأقصى 5 ميغابايت","error");const r=new FileReader();r.onload=()=>onMedia("image",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const hVid=e=>{const f=e.target.files[0];if(!f)return;if(f.size>20*1024*1024)return toast("الحجم الأقصى 20 ميغابايت","error");const r=new FileReader();r.onload=()=>onMedia("video",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const startR=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({audio:true});const m=new MediaRecorder(s);const ch=[];m.ondataavailable=e=>ch.push(e.data);m.onstop=()=>{s.getTracks().forEach(t=>t.stop());const b=new Blob(ch,{type:"audio/webm"});const r=new FileReader();r.onload=()=>setRd({data:r.result,duration:rr.current});r.readAsDataURL(b);};m.start();mr.current=m;setRec(true);setRs(0);rr.current=0;tr.current=setInterval(()=>{rr.current+=1;setRs(s=>s+1);},1000);}catch{toast("تعذّر الوصول للميكروفون","error");}};
  const stopR=()=>{if(!mr.current||mr.current.state==="inactive")return;mr.current.stop();clearInterval(tr.current);setRec(false);};
  const sendV=()=>{if(!rd)return;onMedia("voice",rd.data,rd.duration);setRd(null);setMode("text");snd("send");};

  return(
    <div style={{background:th.topbar,borderTop:`1px solid ${th.border}`,flexShrink:0}}>
      {/* Cooldown bar */}
      {cooldown&&<div style={{height:2,background:"#6366f133",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,height:"100%",background:"#6366f1",animation:`cooldown ${SPAM_DELAY}ms linear forwards`}}/>
      </div>}
      {mode==="media"&&<div style={{padding:"10px 12px 0",display:"flex",gap:8}}>
        <button onClick={()=>ir.current.click()} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:24}}>🖼</span><span>صورة</span></button>
        <button onClick={()=>vr.current.click()} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:24}}>🎥</span><span>فيديو</span></button>
        <button onClick={()=>setMode("voice")} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:24}}>🎙</span><span>صوتية</span></button>
        <input ref={ir} type="file" accept="image/*" style={{display:"none"}} onChange={hImg}/>
        <input ref={vr} type="file" accept="video/*" style={{display:"none"}} onChange={hVid}/>
      </div>}
      {mode==="voice"&&<div style={{padding:"14px"}}>
        {!rec&&!rd&&<div style={{textAlign:"center"}}><p style={{color:th.text2,fontSize:13,marginBottom:10}}>اضغط للتسجيل</p><button onClick={startR} style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",cursor:"pointer",fontSize:26,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 18px rgba(239,68,68,.4)"}}>🎙</button></div>}
        {rec&&<div style={{textAlign:"center"}}><div style={{color:"#ef4444",fontSize:14,marginBottom:10,fontWeight:600}}>🔴 {rs}ث</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={stopR} style={{padding:"10px 22px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>⏹ إيقاف</button><button onClick={()=>{stopR();setTimeout(()=>{setRd(null);setRec(false);setRs(0);},300);}} style={{padding:"10px 18px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕</button></div></div>}
        {rd&&!rec&&<div style={{textAlign:"center"}}><div style={{color:"#22c55e",fontSize:13,marginBottom:10}}>✅ {rd.duration}ث</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={sendV} style={{padding:"10px 24px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>إرسال ←</button><button onClick={()=>{setRd(null);setMode("text");}} style={{padding:"10px 18px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>إلغاء</button></div></div>}
      </div>}
      <div style={{padding:"8px 10px",display:"flex",gap:7,alignItems:"center"}}>
        <button onClick={()=>setMode(mode==="text"?"media":"text")} style={{width:38,height:38,flexShrink:0,background:mode!=="text"?"#6366f122":th.card2,border:`1px solid ${mode!=="text"?"#6366f1":th.border}`,borderRadius:12,cursor:"pointer",color:mode!=="text"?"#6366f1":th.text3,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{mode!=="text"?"✕":"+"}</button>
        <input value={val} onChange={onChange} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder={ph} style={{flex:1,padding:"10px 14px",background:th.inp,border:`1.5px solid ${val?"#6366f1":th.inpBorder}`,borderRadius:22,color:th.text,fontSize:14,fontFamily:"inherit",outline:"none",direction:"rtl",transition:"border-color .2s"}}/>
        <button onClick={send} disabled={cooldown&&!val.trim()} style={{width:38,height:38,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 2px 8px rgba(99,102,241,.35)",opacity:cooldown?0.7:1,transition:"opacity .2s"}}>←</button>
      </div>
    </div>
  );
});

// ─── Add Member Inline ────────────────────────────────────
const AddMemberInline=({gid,onAdd,th,I,B})=>{
  const[v,setV]=useState("");
  const add=()=>{if(v.trim()){onAdd(gid,v.trim());setV("");}};
  return<div style={{display:"flex",gap:5}}>
    <input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="+ إضافة عضو..." style={{...I,flex:1,padding:"7px 10px",fontSize:12}}/>
    <button onClick={add} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)","#fff",{padding:"7px 10px",fontSize:12})}}>+</button>
  </div>;
};

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App(){
  const{dark,toggle:toggleDark}=useTheme();
  const th=T(dark);

  // ── State ──────────────────────────────────────────────────
  const[me,setMe]=useState(()=>{try{return localStorage.getItem("nbu")||null;}catch{return null;}});
  const[screen,setScreen]=useState(me?"home":"auth");
  const[activeId,setActiveId]=useState(null);
  const[users,setUsers]=useState({});
  const[groups,setGroups]=useState({});
  const[msgs,setMsgs]=useState([]);
  const[dmChats,setDmChats]=useState({});
  const[stories,setStories]=useState({});
  const[presence,setPresence]=useState({});
  const[friendReqs,setFriendReqs]=useState({});
  const[typingMap,setTypingMap]=useState({});
  const[chatBgs,setChatBgs]=useState(()=>ls("chatBgs",{}));
  const[bubbleColors,setBubbleColors]=useState(()=>ls("bubbleColors",{}));

  // Auth
  const[aMode,setAMode]=useState("login");const[aUser,setAUser]=useState("");const[aPass,setAPass]=useState("");const[aErr,setAErr]=useState("");const[aLoading,setALoading]=useState(false);
  // UI
  const[ngName,setNgName]=useState("");const[jCode,setJCode]=useState("");const[jErr,setJErr]=useState("");
  const[panel,setPanel]=useState(false);const[tab,setTab]=useState("chats");
  const[vImg,setVImg]=useState(null);const[stIn,setStIn]=useState(null);
  const[vStoryUser,setVStoryUser]=useState(null);
  const[showCustomize,setShowCustomize]=useState(false);
  const[groupEdit,setGroupEdit]=useState(false);const[gNewName,setGNewName]=useState("");const[gNewPhoto,setGNewPhoto]=useState(null);
  const[copied,setCopied]=useState(false);const[showNdm,setShowNdm]=useState(false);const[ndmU,setNdmU]=useState("");
  const[friendSearch,setFriendSearch]=useState("");
  // Profile edit
  const[eEmoji,setEEmoji]=useState("");const[eBio,setEBio]=useState("");const[ePhoto,setEPhoto]=useState(null);
  // Password change
  const[showPwdForm,setShowPwdForm]=useState(false);const[pwdOld,setPwdOld]=useState("");const[pwdNew,setPwdNew]=useState("");const[pwdNew2,setPwdNew2]=useState("");const[pwdLoading,setPwdLoading]=useState(false);

  const stRef=useRef(null);const phRef=useRef(null);const gPhRef=useRef(null);const bgRef=useRef(null);
  const pLen=useRef(0);const typingRef=useRef(null);

  // ── Firebase ready ────────────────────────────────────────
  const[fbReady,setFbReady]=useState(window.__fbReady||false);
  useEffect(()=>{if(!window.__fbReady){const h=()=>setFbReady(true);window.addEventListener('fbReady',h);return()=>window.removeEventListener('fbReady',h);}else setFbReady(true);},[]);

  // ── Presence ──────────────────────────────────────────────
  const setPresenceOnline=useCallback(u=>{
    if(!u)return;
    const r=F().ref(D(),`presence/${u}`);
    dSet(`presence/${u}`,{online:true,last:Date.now()});
    F().onDisconnect(r).set({online:false,last:Date.now()});
  },[]);

  useEffect(()=>{if(fbReady&&me)setPresenceOnline(me);},[fbReady,me]);
  useEffect(()=>{
    const h=()=>{if(me)dSet(`presence/${me}`,{online:true,last:Date.now()});};
    window.addEventListener("focus",h);document.addEventListener("visibilitychange",()=>{if(!document.hidden&&me)h();});
    return()=>window.removeEventListener("focus",h);
  },[me]);

  // ── Auth / Session ────────────────────────────────────────
  const login=u=>{setMe(u);try{localStorage.setItem("nbu",u);}catch{}setScreen("home");requestNotifPerm();setPresenceOnline(u);};
  const logout=async()=>{if(me){await dSet(`presence/${me}`,{online:false,last:Date.now()});try{localStorage.removeItem("nbu");}catch{}}setMe(null);setScreen("auth");setActiveId(null);setMsgs([]);};

  // ── Main data listeners ───────────────────────────────────
  useEffect(()=>{
    if(!fbReady)return;
    const unsubs=[
      dListen("users",v=>setUsers(v||{})),
      dListen("groups",v=>setGroups(v||{})),
      dListen("stories",v=>setStories(v||{})),
      dListen("dmMsgs",v=>setDmChats(v||{})),
      dListen("presence",v=>setPresence(v||{})),
      dListen("friendRequests",v=>setFriendReqs(v||{})),
      dListen("typing",v=>setTypingMap(v||{})),
    ];
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  // ── Clean expired stories (24h) ───────────────────────────
  useEffect(()=>{
    if(!fbReady||!stories)return;
    const now=Date.now();
    Object.entries(stories).forEach(([u,us])=>{
      if(!us)return;
      Object.entries(us).forEach(([sid,s])=>{if(now-s.ts>86400000)dDel(`stories/${u}/${sid}`);});
    });
  },[stories]);

  // ── Messages listener ─────────────────────────────────────
  useEffect(()=>{
    if(!me||!activeId)return;
    let path="";
    if(screen==="group")path=`groupMsgs/${activeId}`;
    else if(screen==="dm")path=`dmMsgs/${[me,activeId].sort().join("_")}`;
    else return;
    pLen.current=0;
    const unsub=dListen(path,v=>{
      if(!v){setMsgs([]);pLen.current=0;return;}
      const arr=Object.entries(v).map(([id,m])=>({...m,id})).sort((a,b)=>a.ts-b.ts);
      if(arr.length>pLen.current&&pLen.current>0){
        arr.slice(pLen.current).forEach(m=>{
          if(m.sender!==me){
            snd("recv");
            showNotif(
              screen==="dm"?`رسالة من ${m.sender}`:`رسالة في مجموعة`,
              m.type==="text"?m.text:"🖼 وسائط",
              ()=>{window.focus();}
            );
          }
        });
      }
      pLen.current=arr.length;
      setMsgs(arr);
      if(screen==="dm"){const key=[me,activeId].sort().join("_");markRead(key);}
    });
    return unsub;
  },[me,activeId,screen]);

  // ── Unread counts ─────────────────────────────────────────
  const unreadCounts=useMemo(()=>{
    const counts={};
    if(!me||!dmChats)return counts;
    Object.keys(users).filter(u=>u!==me).forEach(u=>{
      const key=[me,u].sort().join("_");
      const ms=dmChats[key]?Object.values(dmChats[key]).sort((a,b)=>a.ts-b.ts):[];
      let lastRead=0;try{const lr=ls("nabda_read",{});lastRead=lr[key]||0;}catch{}
      const unread=ms.filter(m=>m.sender!==me&&m.ts>lastRead).length;
      if(unread>0)counts[u]=unread;
    });
    return counts;
  },[dmChats,me,users]);

  const markRead=useCallback(chatId=>{
    try{const lr=ls("nabda_read",{});lr[chatId]=Date.now();lsSet("nabda_read",lr);}catch{}
  },[]);

  // ── Navigation ────────────────────────────────────────────
  const go=useCallback((s,id=null)=>{
    setScreen(s);setActiveId(id);setPanel(false);setJErr("");setJCode("");
    setShowCustomize(false);setGroupEdit(false);setShowNdm(false);setShowPwdForm(false);
    pLen.current=0;setMsgs([]);
    if(s==="dm"&&id&&me){const key=[me,id].sort().join("_");markRead(key);}
    if(s==="profile"&&me){const md=users[me];setEEmoji(md?.emoji||"");setEBio(md?.bio||"");setEPhoto(md?.photo||null);}
    if(s!=="auth")window.history.pushState({},"","");
  },[me,markRead,users]);

  useEffect(()=>{
    const h=e=>{if(screen!=="home"&&screen!=="auth"){e.preventDefault();go("home");}};
    window.addEventListener("popstate",h);
    if(screen!=="home"&&screen!=="auth")window.history.pushState({},"","");
    return()=>window.removeEventListener("popstate",h);
  },[screen]);

  const md=me?users[me]:null;

  // ── AUTH ──────────────────────────────────────────────────
  const auth=async()=>{
    setAErr("");const u=aUser.trim(),p=aPass.trim();
    if(!u||!p)return setAErr("أدخل الاسم وكلمة المرور");
    if(u.includes(" "))return setAErr("اسم المستخدم لا يحتوي على مسافات");
    setALoading(true);
    try{
      if(aMode==="login"){
        const d=await dGet(`users/${u}`);
        if(!d){setAErr("المستخدم غير موجود");return;}
        if(d.password!==p){setAErr("كلمة المرور خاطئة");return;}
        login(u);
      }else{
        if(u.length<2)return setAErr("الاسم قصير جداً (حرفان على الأقل)");
        if(u.length>20)return setAErr("الاسم طويل جداً (20 حرفاً كحد أقصى)");
        if(p.length<4)return setAErr("كلمة المرور قصيرة (4 أحرف على الأقل)");
        const e=await dGet(`users/${u}`);
        if(e)return setAErr("اسم المستخدم محجوز، اختر اسماً آخر");
        await dSet(`users/${u}`,{username:u,password:p,emoji:"",bio:"",photo:null,createdAt:Date.now()});
        login(u);
      }
    }finally{setALoading(false);}
  };

  // ── FRIENDS ───────────────────────────────────────────────
  const myFriends=useMemo(()=>me&&users[me]?Object.keys(users[me]?.friends||{}):[],[users,me]);

  const sendFriendReq=async target=>{
    if(!target||!users[target]||target===me)return toast("المستخدم غير موجود","error");
    if(myFriends.includes(target))return toast("أنتما أصدقاء بالفعل","info");
    const existing=await dGet(`friendRequests/${target}/${me}`);
    if(existing)return toast("تم إرسال الطلب مسبقاً","info");
    await dSet(`friendRequests/${target}/${me}`,{from:me,ts:Date.now()});
    snd("notif");toast(`تم إرسال طلب صداقة إلى ${target} ✓`,"success");
  };
  const acceptFriendReq=async from=>{
    await dUpd(`users/${me}/friends`,{[from]:true});
    await dUpd(`users/${from}/friends`,{[me]:true});
    await dDel(`friendRequests/${me}/${from}`);
    snd("notif");toast(`أصبحت وصديق ${from} ✓`,"success");
    showNotif("صديق جديد!",`${from} أصبح صديقك الآن`);
  };
  const rejectFriendReq=async from=>{await dDel(`friendRequests/${me}/${from}`);toast("تم رفض الطلب","info");};
  const removeFriend=async friend=>{
    if(!confirm(`هل تريد إزالة ${friend} من قائمة أصدقائك؟`))return;
    await dDel(`users/${me}/friends/${friend}`);await dDel(`users/${friend}/friends/${me}`);
    toast("تمت الإزالة","info");
  };
  const myPendingReqs=me&&friendReqs[me]?Object.keys(friendReqs[me]):[];
  const totalNotifs=myPendingReqs.length+Object.values(unreadCounts).reduce((a,b)=>a+b,0);

  // ── MESSAGES ──────────────────────────────────────────────
  const sendG=useCallback(async t=>{if(!t.trim())return;await dPush(`groupMsgs/${activeId}`,{sender:me,type:"text",text:t,ts:Date.now()});snd("send");},[activeId,me]);
  const sendD=useCallback(async t=>{if(!t.trim())return;const c=[me,activeId].sort().join("_");await dPush(`dmMsgs/${c}`,{sender:me,type:"text",text:t,ts:Date.now()});snd("send");},[activeId,me]);
  const medG=useCallback(async(tp,d,dur=0)=>{await dPush(`groupMsgs/${activeId}`,{sender:me,type:tp,data:d,duration:dur,ts:Date.now()});snd("send");},[activeId,me]);
  const medD=useCallback(async(tp,d,dur=0)=>{const c=[me,activeId].sort().join("_");await dPush(`dmMsgs/${c}`,{sender:me,type:tp,data:d,duration:dur,ts:Date.now()});snd("send");},[activeId,me]);

  const handleRefresh=useCallback(async()=>{
    // Force re-listen by toggling (data is realtime, just cosmetic refresh)
    toast("تم التحديث ✓","success");
  },[]);

  // ── TYPING ────────────────────────────────────────────────
  const handleTyping=useCallback(isTyping=>{
    if(!activeId)return;
    const path=screen==="dm"?`typing/dm/${[me,activeId].sort().join("_")}/${me}`:`typing/group/${activeId}/${me}`;
    if(isTyping){dSet(path,true);clearTimeout(typingRef.current);typingRef.current=setTimeout(()=>dDel(path),3000);}
    else dDel(path);
  },[activeId,me,screen]);

  useEffect(()=>()=>{
    if(me&&activeId){
      const path=screen==="dm"?`typing/dm/${[me,activeId].sort().join("_")}/${me}`:`typing/group/${activeId}/${me}`;
      dDel(path);
    }
  },[me,activeId,screen]);

  const typingUsers=useMemo(()=>{
    if(!activeId||!me)return[];
    const obj=screen==="dm"?(typingMap?.dm?.[`${[me,activeId].sort().join("_")}`]||{}):(typingMap?.group?.[activeId]||{});
    return Object.keys(obj).filter(u=>u!==me);
  },[activeId,me,screen,typingMap]);

  // ── GROUPS ────────────────────────────────────────────────
  const mkGrp=async()=>{
    if(!ngName.trim())return;
    const gid=uid(),inv=uid();
    await dSet(`groups/${gid}`,{id:gid,name:ngName.trim(),admin:me,members:{[me]:true},mods:{},pending:{},inviteCode:inv,inviteActive:true,photo:null,createdAt:Date.now()});
    setNgName("");go("group",gid);toast("تم إنشاء المجموعة ✓","success");
  };
  const joinInv=async()=>{
    setJErr("");const code=jCode.trim();
    const all=await dGet("groups");if(!all)return setJErr("لا توجد مجموعات");
    const g=Object.values(all).find(g=>g.inviteCode===code&&g.inviteActive);
    if(!g)return setJErr("رمز الدعوة غير صالح أو منتهي");
    if(g.members&&g.members[me]){go("group",g.id);return;}
    await dUpd(`groups/${g.id}/members`,{[me]:true});
    if(g.pending&&g.pending[me])await dDel(`groups/${g.id}/pending/${me}`);
    go("group",g.id);setJCode("");toast("تم الانضمام ✓","success");
    // notify admin
    showNotif("عضو جديد",`${me} انضم للمجموعة ${g.name}`);
  };
  const reqJoin=async()=>{
    setJErr("");const gid=jCode.trim();
    const g=await dGet(`groups/${gid}`);
    if(!g)return setJErr("المعرّف غير موجود");
    if(g.members&&g.members[me])return setJErr("أنت بالفعل عضو");
    if(g.pending&&g.pending[me])return setJErr("طلبك قيد الانتظار بالفعل");
    await dUpd(`groups/${gid}/pending`,{[me]:true});setJErr("✅ تم إرسال الطلب للمشرف!");
  };
  const approve=async(gid,u)=>{
    await dUpd(`groups/${gid}/members`,{[u]:true});
    await dDel(`groups/${gid}/pending/${u}`);
    snd("notif");toast(`تم قبول ${u} ✓`,"success");
    // Notify the user added to group
    showNotif("تمت إضافتك لمجموعة",`تمت إضافتك في المجموعة`);
  };
  const reject=(gid,u)=>{dDel(`groups/${gid}/pending/${u}`);toast("تم رفض الطلب","info");};
  const kick=(gid,u)=>{if(!confirm(`هل تريد إزالة ${u} من المجموعة؟`))return;dDel(`groups/${gid}/members/${u}`);toast(`تمت إزالة ${u}`,"info");};
  const togInv=(gid,cur)=>dUpd(`groups/${gid}`,{inviteActive:!cur});
  const addMember=async(gid,username)=>{

          <h2 style={{fontWeight:800,fontSize:20,marginBottom:8,color:th.text}}>الانضمام لمجموعة</h2>
          <p style={{color:th.text3,fontSize:13,marginBottom:20}}>أدخل رمز الدعوة أو معرّف المجموعة</p>
          <input value={jCode} onChange={e=>setJCode(e.target.value)} placeholder="ادخل الرمز..." style={{...I,marginBottom:12}} autoFocus/>
          {jErr&&<div style={{marginBottom:12,padding:"9px 14px",background:jErr.startsWith("✅")?"#f0fdf4":"#fef2f2",borderRadius:10,color:jErr.startsWith("✅")?"#22c55e":"#ef4444",fontSize:13,fontWeight:600}}>{jErr}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={joinInv} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),flex:1,fontSize:13,borderRadius:12}}>انضمام برمز</button>
            <button onClick={reqJoin} style={{...B(th.card2,dark?"#a5b4fc":"#6366f1",{flex:1,fontSize:13,border:`1px solid ${th.border}`,borderRadius:12})}}>إرسال طلب</button>
          </div>
        </div>
      </div>}

      {/* ── DM CHAT ──────────────────────────────────────── */}
      {screen==="dm"&&activeId&&<>
        <MsgList msgs={msgs} me={me} isGroup={false} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} typingUsers={typingUsers} chatBg={currentChatBg} bubbleColor={currentBubbleColor} th={th} onRefresh={handleRefresh}
          empty={<div style={{textAlign:"center",marginTop:60,color:th.text3}}><div style={{fontSize:44}}>👋</div><div style={{fontSize:14,marginTop:8}}>ابدأ المحادثة مع <b>{activeId}</b></div></div>}/>
        <ChatInp ph={`رسالة إلى ${activeId}...`} onSend={sendD} onMedia={medD} onTyping={handleTyping} th={th}/>
      </>}

      {/* ── GROUP CHAT ───────────────────────────────────── */}
      {screen==="group"&&ag&&<div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <MsgList msgs={msgs} me={me} isGroup={true} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} typingUsers={typingUsers} chatBg={currentChatBg} bubbleColor={currentBubbleColor} th={th} onRefresh={handleRefresh}
            empty={<div style={{textAlign:"center",marginTop:50,color:th.text3}}>
              <div style={{fontSize:44}}>💬</div>
              <div style={{fontSize:14,marginTop:8}}>لا توجد رسائل بعد</div>
              {canManage(activeId)&&<div style={{marginTop:14,padding:"14px",background:th.card,borderRadius:14,border:`1px solid ${th.border}`,display:"inline-block"}}>
                <div style={{color:"#6366f1",fontSize:12,fontWeight:700,marginBottom:4}}>🔗 رمز الدعوة</div>
                <div style={{fontFamily:"monospace",color:"#22c55e",fontSize:15,letterSpacing:"2px",fontWeight:700}}>{ag.inviteCode}</div>
              </div>}
            </div>}/>
          <ChatInp ph={`رسالة في ${ag.name}...`} onSend={sendG} onMedia={medG} onTyping={handleTyping} th={th}/>
        </div>

        {/* Group panel */}
        {panel&&<div style={{width:230,background:th.topbar,borderRight:`1px solid ${th.border}`,overflowY:"auto",flexShrink:0,WebkitOverflowScrolling:"touch"}}>
          <div style={{padding:"12px 14px",fontWeight:700,fontSize:11,color:th.text3,borderBottom:`1px solid ${th.border}`,letterSpacing:"1px"}}>
            {isGroupAdmin(activeId)?"👑 الإدارة":isGroupMod(activeId)?"🛡 المشرف المساعد":"👥 الأعضاء"}
          </div>

          {/* Admin/mod controls */}
          {canManage(activeId)&&<div style={{padding:"10px 14px",borderBottom:`1px solid ${th.border}`}}>
            {/* Edit group - admin only */}
            {isGroupAdmin(activeId)&&<>
              {!groupEdit?<button onClick={()=>{setGroupEdit(true);setGNewName(ag.name);}} style={{...B(th.card2,th.text,{width:"100%",fontSize:12,border:`1px solid ${th.border}`,marginBottom:8})}}>✏️ تعديل المجموعة</button>
              :<div>
                <input value={gNewName} onChange={e=>setGNewName(e.target.value)} placeholder="اسم جديد..." style={{...I,fontSize:12,marginBottom:6}} maxLength={40}/>
                <div style={{display:"flex",gap:4,marginBottom:6}}>
                  <button onClick={()=>gPhRef.current.click()} style={{...B(th.card2,th.text,{flex:1,fontSize:11,border:`1px solid ${th.border}`,padding:"6px"})}}>📷 صورة</button>
                  <input ref={gPhRef} type="file" accept="image/*" style={{display:"none"}} onChange={hGPhoto}/>
                  {gNewPhoto&&<img src={gNewPhoto} style={{width:32,height:32,borderRadius:6,objectFit:"cover"}} loading="lazy"/>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>saveGroupEdit(ag.id)} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)","#fff",{flex:1,fontSize:11,padding:"7px"})}}>حفظ</button>
                  <button onClick={()=>setGroupEdit(false)} style={{...B(th.card2,th.text,{flex:1,fontSize:11,padding:"7px",border:`1px solid ${th.border}`})}}>إلغاء</button>
                </div>
              </div>}
            </>}

            {/* Invite code - admin only */}
            {isGroupAdmin(activeId)&&<>
              <div style={{fontSize:10,color:th.text3,fontWeight:700,marginBottom:4,marginTop:6}}>رمز الدعوة</div>
              <div style={{fontFamily:"monospace",fontSize:11,padding:"7px 10px",background:th.card2,borderRadius:8,color:ag.inviteActive?"#22c55e":th.text3,wordBreak:"break-all",marginBottom:6,border:`1px solid ${th.border}`}}>{ag.inviteActive?ag.inviteCode:"🔒 مغلق"}</div>
              <div style={{fontSize:10,color:th.text3,marginBottom:8}}>ID: <span style={{color:"#6366f1",fontFamily:"monospace"}}>{ag.id}</span></div>
              <div style={{display:"flex",gap:5}}>
                {ag.inviteActive&&<button onClick={()=>{try{navigator.clipboard.writeText(ag.inviteCode);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);toast("تم نسخ الرمز ✓","success");}} style={{flex:1,padding:"6px",background:copied?"#f0fdf4":th.card2,border:`1px solid ${copied?"#22c55e":th.border}`,borderRadius:8,color:copied?"#22c55e":th.text2,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{copied?"✓ تم":"نسخ"}</button>}
                <button onClick={()=>togInv(ag.id,ag.inviteActive)} style={{flex:1,padding:"6px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:8,color:ag.inviteActive?"#ef4444":"#22c55e",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{ag.inviteActive?"إغلاق":"فتح"}</button>
              </div>
              <button onClick={()=>deleteGroup(ag.id)} style={{...B(dark?"#1e1e2e":"#fff","#ef4444",{width:"100%",marginTop:8,fontSize:11,border:"1px solid #fecaca"})}}>🗑 حذف المجموعة</button>
            </>}

            {/* Add member */}
            <div style={{marginTop:10}}>
              <AddMemberInline gid={ag.id} onAdd={addMember} th={th} I={I} B={B}/>
            </div>
          </div>}

          {/* Pending requests */}
          {canManage(activeId)&&agP.length>0&&<div style={{padding:"8px 14px",borderBottom:`1px solid ${th.border}`}}>
            <div style={{fontSize:10,color:"#ef4444",fontWeight:700,marginBottom:6}}>طلبات ({agP.length})</div>
            {agP.map(u=><div key={u} style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
              <Av user={users[u]} size={24}/>
              <span style={{flex:1,fontSize:12,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u}</span>
              <button onClick={()=>approve(ag.id,u)} style={{background:"#f0fdf4",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#22c55e",fontSize:13}}>✓</button>
              <button onClick={()=>reject(ag.id,u)} style={{background:"#fef2f2",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#ef4444",fontSize:13}}>✗</button>
            </div>)}
          </div>}

          {/* Members list */}
          <div style={{padding:"8px 14px"}}>
            <div style={{fontSize:10,color:th.text3,fontWeight:700,marginBottom:8}}>الأعضاء ({agM.length})</div>
            {agM.map(u=>{
              const isMod=ag.mods&&ag.mods[u];
              return<div key={u} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av user={users[u]} size={34} online={isOnline(u)}/></button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:u===ag.admin||isMod?700:400,color:th.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u}</div>
                  <div style={{fontSize:9,color:u===ag.admin?"#f59e0b":isMod?"#6366f1":isOnline(u)?"#22c55e":th.text3}}>
                    {u===ag.admin?"👑 مشرف رئيسي":isMod?"🛡 مشرف مساعد":isOnline(u)?"متصل":lastSeen(u)}
                  </div>
                </div>
                {/* Admin actions on members */}
                {isGroupAdmin(activeId)&&u!==me&&<div style={{display:"flex",gap:3}}>
                  <button onClick={()=>toggleMod(ag.id,u)} title={isMod?"إزالة المشرف":"ترقية لمشرف"} style={{background:"none",border:"none",cursor:"pointer",color:isMod?"#6366f1":th.text3,fontSize:14,padding:"2px 4px"}}>🛡</button>
                  <button onClick={()=>kick(ag.id,u)} title="إزالة من المجموعة" style={{background:"none",border:"none",cursor:"pointer",color:th.text3,fontSize:14,padding:"2px 4px"}}>🚫</button>
                </div>}
                {/* Mod can kick non-admins */}
                {isGroupMod(activeId)&&!isGroupAdmin(activeId)&&u!==me&&u!==ag.admin&&!isMod&&
                  <button onClick={()=>kick(ag.id,u)} style={{background:"none",border:"none",cursor:"pointer",color:th.text3,fontSize:14,padding:"2px 4px"}}>🚫</button>}
              </div>;
            })}
          </div>
        </div>}
      </div>}
    </div>
  );
}

function Root(){
  const[r,setR]=useState(window.__fbReady||false);
  useEffect(()=>{if(!window.__fbReady){const h=()=>setR(true);window.addEventListener('fbReady',h);return()=>window.removeEventListener('fbReady',h);}else setR(true);},[]);
  const dark=window.matchMedia?.("(prefers-color-scheme:dark)").matches;
  if(!r)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:dark?"linear-gradient(160deg,#0a0a14,#0d0d1a)":"linear-gradient(160deg,#f0f4ff,#e8eeff)",flexDirection:"column",gap:16}}>
    <div style={{width:64,height:64,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,boxShadow:"0 8px 24px rgba(99,102,241,.35)"}}>💬</div>
    <div style={{color:dark?"#a5b4fc":"#6366f1",fontSize:20,fontWeight:800}}>نبضة</div>
    <div style={{width:32,height:32,border:"3px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
  </div>;
  return<App/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
