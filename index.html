<style>

<body>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5;color:#6366f1;font-size:22px;flex-direction:column;gap:12px"><div style="width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px">💬</div><div style="font-size:16px;color:#666">جاري التحميل...</div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,off,update,remove,serverTimestamp,onDisconnect}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBqRplVWgiZUXkbujiQ-KWNca6dPwC-kOk",authDomain:"nabda-chat.firebaseapp.com",databaseURL:"https://nabda-chat-default-rtdb.firebaseio.com",projectId:"nabda-chat",storageBucket:"nabda-chat.firebasestorage.app",messagingSenderId:"399164736455",appId:"1:399164736455:web:127df9589215b9e8120fe2"};
const app=initializeApp(cfg);const db=getDatabase(app);
window.__db=db;window.__fn={ref,set,get,push,onValue,off,update,remove,serverTimestamp,onDisconnect};
window.__fbReady=true;window.dispatchEvent(new Event('fbReady'));
</script>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback,memo,useMemo}=React;
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
const fmtFull=ts=>{const d=new Date(ts);const now=new Date();const diff=now-d;if(diff<60000)return"الآن";if(diff<3600000)return`منذ ${Math.floor(diff/60000)} د`;if(diff<86400000)return`${fmt(ts)}`;return d.toLocaleDateString("ar");};
const COLS=["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ef4444","#06b6d4"];
const uc=n=>n?COLS[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLS.length]:"#6366f1";

// DB helpers
const D=()=>window.__db;const F=()=>window.__fn;
const dSet=(p,v)=>F().set(F().ref(D(),p),v);
const dUpd=(p,v)=>F().update(F().ref(D(),p),v);
const dPush=(p,v)=>F().push(F().ref(D(),p),v);
const dGet=async p=>{const s=await F().get(F().ref(D(),p));return s.exists()?s.val():null;};
const dListen=(p,cb)=>{const r=F().ref(D(),p);F().onValue(r,s=>cb(s.val()));return()=>F().off(r);};
const dDel=p=>F().remove(F().ref(D(),p));

// Theme
const useTheme=()=>{const[dark,setDark]=useState(()=>{const s=localStorage.getItem("nabda_theme");if(s)return s==="dark";return window.matchMedia?.("(prefers-color-scheme:dark)").matches;});const toggle=()=>{const nd=!dark;setDark(nd);localStorage.setItem("nabda_theme",nd?"dark":"light");};return{dark,toggle};};

const T=(dark)=>({
  bg: dark?"#0a0a14":"#f0f2f5",
  card: dark?"#12121e":"#ffffff",
  card2: dark?"#1e1e2e":"#f8f9fa",
  border: dark?"#1e1e30":"#e5e7eb",
  text: dark?"#e0e0f0":"#1f2937",
  text2: dark?"#888":"#6b7280",
  text3: dark?"#555":"#9ca3af",
  inp: dark?"#1e1e2e":"#f3f4f6",
  inpBorder: dark?"#2a2a3e":"#d1d5db",
  bubble: dark?"#1e1e2e":"#e5e7eb",
  topbar: dark?"#12121e":"#ffffff",
  tabs: dark?"#12121e":"#ffffff",
  thumb: dark?"#2a2a3e":"#d1d5db",
});

// Sound
const snd=t=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);if(t==="send"){o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(660,c.currentTime+0.08);g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);o.start();o.stop(c.currentTime+0.08);}else if(t==="recv"){o.type="sine";o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+0.1);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.start();o.stop(c.currentTime+0.25);}else if(t==="notif"){o.frequency.setValueAtTime(784,c.currentTime);g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start();o.stop(c.currentTime+0.3);}}catch{}};

// Push notification
const requestNotifPerm=async()=>{if("Notification"in window&&Notification.permission==="default")await Notification.requestPermission();};
const showNotif=(title,body,onClick)=>{if("Notification"in window&&Notification.permission==="granted"){const n=new Notification(title,{body,icon:"icon.png",badge:"icon.png"});if(onClick)n.onclick=()=>{window.focus();n.close();onClick();};}};

// Avatar
const Av=memo(({user,size=36,onClick,ring=false,seen=false,online=false})=>{
  const name=user?.username||"?";const c=uc(name);
  const inner=user?.photo
    ?<img src={user.photo} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block"}}/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${c}dd,${c}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:user?.emoji?size*.52:size*.42,fontWeight:800,color:"#fff",userSelect:"none",letterSpacing:"-1px"}}>{user?.emoji||name[0]?.toUpperCase()}</div>;
  return(
    <div onClick={onClick} style={{cursor:onClick?"pointer":"default",flexShrink:0,position:"relative",display:"inline-flex"}}>
      {ring?<div style={{padding:2,borderRadius:"50%",border:`2.5px solid ${seen?"#ccc":"#6366f1"}`,display:"inline-flex"}}>{inner}</div>:inner}
      {online&&<div style={{position:"absolute",bottom:1,left:1,width:Math.max(8,size*.22),height:Math.max(8,size*.22),background:"#22c55e",borderRadius:"50%",border:"2px solid white"}}/>}
    </div>
  );
});

// Image viewer
const ImgView=({src,onClose})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <img src={src} style={{maxWidth:"96vw",maxHeight:"88vh",objectFit:"contain",borderRadius:10}} onClick={e=>e.stopPropagation()}/>
    <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>✕</button>
  </div>
);

// Message bubble content
const MsgContent=memo(({msg,onImg,th})=>{
  const[play,setPlay]=useState(false);const ar=useRef(null);
  if(msg.type==="image")return<img src={msg.data} style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block",cursor:"pointer"}} onClick={()=>onImg&&onImg(msg.data)}/>;
  if(msg.type==="video")return<video src={msg.data} controls playsInline style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block"}}/>;
  if(msg.type==="voice"){
    const tog=()=>{if(!ar.current)return;if(play){ar.current.pause();setPlay(false);}else{ar.current.play().catch(()=>{});setPlay(true);}};
    return<div style={{display:"flex",alignItems:"center",gap:10,minWidth:160}}><audio ref={ar} src={msg.data} onEnded={()=>setPlay(false)}/><button onClick={tog} style={{width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:"rgba(255,255,255,.2)",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{play?"⏸":"▶"}</button><div><div style={{fontSize:12,opacity:.8}}>رسالة صوتية</div>{msg.duration>0&&<div style={{fontSize:10,opacity:.5}}>{msg.duration}ث</div>}</div><span style={{fontSize:20}}>🎙</span></div>;
  }
  return<span style={{wordBreak:"break-word",lineHeight:1.5}}>{msg.text}</span>;
});

// Bubble
const Bubble=memo(({msg,me,isGroup,users,onImg,onAv,chatBg,bubbleColor,th,dark})=>{
  const mine=msg.sender===me;const sender=users[msg.sender]||{username:msg.sender};
  const isMedia=["image","video","voice"].includes(msg.type);
  const myBubble=bubbleColor||"linear-gradient(135deg,#6366f1,#8b5cf6)";
  const theirBubble=th.bubble;
  return(
    <div className="fadein" style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:6,marginBottom:4}}>
      {!mine&&<Av user={sender} size={28} onClick={()=>onAv&&onAv(msg.sender)}/>}
      <div style={{maxWidth:"78%"}}>
        {!mine&&isGroup&&<div style={{fontSize:10,color:uc(msg.sender),fontWeight:700,marginBottom:2,paddingRight:4}}>{msg.sender}</div>}
        <div style={{padding:isMedia?"5px":"8px 12px",borderRadius:mine?"16px 16px 4px 16px":"16px 16px 16px 4px",background:mine?myBubble:theirBubble,color:mine?"#fff":th.text,fontSize:14,lineHeight:1.5,boxShadow:mine?"0 2px 8px rgba(99,102,241,.3)":"0 1px 4px rgba(0,0,0,.1)"}}>
          <MsgContent msg={msg} onImg={onImg} th={th}/>
        </div>
        <div style={{fontSize:10,color:th.text3,marginTop:2,textAlign:mine?"left":"right",paddingRight:2}}>{fmt(msg.ts)}{mine&&" ✓"}</div>
      </div>
    </div>
  );
});

// Messages list
const MsgList=memo(({msgs,me,isGroup,users,empty,onImg,onAv,typingUsers,chatBg,bubbleColor,th,dark})=>{
  const bot=useRef(null);const pLen=useRef(0);
  useEffect(()=>{if(msgs.length!==pLen.current){bot.current?.scrollIntoView({behavior:"smooth"});pLen.current=msgs.length;}},[msgs.length]);
  return(
    <div style={{flex:1,overflowY:"auto",padding:"14px 12px 4px",background:chatBg||th.bg,backgroundSize:"cover",backgroundPosition:"center"}}>
      {msgs.length===0&&empty}
      {msgs.map(m=><Bubble key={m.id||m.ts} msg={m} me={me} isGroup={isGroup} users={users} onImg={onImg} onAv={onAv} chatBg={chatBg} bubbleColor={bubbleColor} th={th} dark={dark}/>)}
      {typingUsers&&typingUsers.length>0&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
          {typingUsers.slice(0,2).map(u=><Av key={u} user={users[u]} size={22}/>)}
          <div style={{background:th.bubble,borderRadius:"12px 12px 12px 4px",padding:"8px 12px"}}>
            <div className="typing" style={{display:"flex",alignItems:"center",gap:2}}>
              <span style={{background:th.text2}}/><span style={{background:th.text2}}/><span style={{background:th.text2}}/>
            </div>
          </div>
        </div>
      )}
      <div ref={bot}/>
    </div>
  );
});

// Chat input
const ChatInp=memo(({ph,onSend,onMedia,onTyping,th})=>{
  const[val,setVal]=useState("");const[mode,setMode]=useState("text");
  const[rec,setRec]=useState(false);const[rs,setRs]=useState(0);const[rd,setRd]=useState(null);
  const mr=useRef(null);const tr=useRef(null);const rr=useRef(0);const typT=useRef(null);
  const ir=useRef(null);const vr=useRef(null);
  const send=useCallback(()=>{if(!val.trim())return;onSend(val.trim());setVal("");snd("send");onTyping&&onTyping(false);},[val,onSend,onTyping]);
  const onChange=e=>{setVal(e.target.value);if(onTyping){onTyping(true);clearTimeout(typT.current);typT.current=setTimeout(()=>onTyping(false),2000);}};
  const hImg=e=>{const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024)return alert("الحجم الأقصى 5 ميغابايت");const r=new FileReader();r.onload=()=>onMedia("image",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const hVid=e=>{const f=e.target.files[0];if(!f)return;if(f.size>20*1024*1024)return alert("الحجم الأقصى 20 ميغابايت");const r=new FileReader();r.onload=()=>onMedia("video",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const startR=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({audio:true});const m=new MediaRecorder(s);const ch=[];m.ondataavailable=e=>ch.push(e.data);m.onstop=()=>{s.getTracks().forEach(t=>t.stop());const b=new Blob(ch,{type:"audio/webm"});const r=new FileReader();r.onload=()=>setRd({data:r.result,duration:rr.current});r.readAsDataURL(b);};m.start();mr.current=m;setRec(true);setRs(0);rr.current=0;tr.current=setInterval(()=>{rr.current+=1;setRs(s=>s+1);},1000);}catch{alert("تعذّر الوصول للميكروفون");}};
  const stopR=()=>{if(!mr.current||mr.current.state==="inactive")return;mr.current.stop();clearInterval(tr.current);setRec(false);};
  const sendV=()=>{if(!rd)return;onMedia("voice",rd.data,rd.duration);setRd(null);setMode("text");snd("send");};
  return(
    <div style={{background:th.topbar,borderTop:`1px solid ${th.border}`,flexShrink:0}}>
      {mode==="media"&&<div style={{padding:"10px 12px 0",display:"flex",gap:8}}>
        <button onClick={()=>ir.current.click()} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:26}}>🖼</span><span>صورة</span></button>
        <button onClick={()=>vr.current.click()} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:26}}>🎥</span><span>فيديو</span></button>
        <button onClick={()=>setMode("voice")} style={{flex:1,padding:"12px 8px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:th.text,cursor:"pointer",fontSize:12,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:26}}>🎙</span><span>صوتية</span></button>
        <input ref={ir} type="file" accept="image/*" style={{display:"none"}} onChange={hImg}/>
        <input ref={vr} type="file" accept="video/*" style={{display:"none"}} onChange={hVid}/>
      </div>}
      {mode==="voice"&&<div style={{padding:"14px"}}>
        {!rec&&!rd&&<div style={{textAlign:"center"}}><p style={{color:th.text2,fontSize:13,marginBottom:10}}>اضغط للتسجيل</p><button onClick={startR} style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",cursor:"pointer",fontSize:28,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(239,68,68,.4)"}}>🎙</button></div>}
        {rec&&<div style={{textAlign:"center"}}><div style={{color:"#ef4444",fontSize:14,marginBottom:10,fontWeight:600}}>🔴 {rs}ث</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={stopR} style={{padding:"10px 22px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>⏹ إيقاف</button><button onClick={()=>{stopR();setTimeout(()=>{setRd(null);setRec(false);setRs(0);},300);}} style={{padding:"10px 18px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕</button></div></div>}
        {rd&&!rec&&<div style={{textAlign:"center"}}><div style={{color:"#22c55e",fontSize:13,marginBottom:10}}>✅ {rd.duration}ث</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={sendV} style={{padding:"10px 24px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>إرسال ←</button><button onClick={()=>{setRd(null);setMode("text");}} style={{padding:"10px 18px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:12,color:"#ef4444",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>إلغاء</button></div></div>}
      </div>}
      <div style={{padding:"8px 10px",display:"flex",gap:7,alignItems:"center"}}>
        <button onClick={()=>setMode(mode==="text"?"media":"text")} style={{width:40,height:40,flexShrink:0,background:mode!=="text"?"#6366f122":th.card2,border:`1px solid ${mode!=="text"?"#6366f1":th.border}`,borderRadius:12,cursor:"pointer",color:mode!=="text"?"#6366f1":th.text3,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{mode!=="text"?"✕":"+"}</button>
        <input value={val} onChange={onChange} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder={ph} style={{flex:1,padding:"10px 14px",background:th.inp,border:`1.5px solid ${val?("#6366f1"):th.inpBorder}`,borderRadius:22,color:th.text,fontSize:14,fontFamily:"inherit",outline:"none",direction:"rtl",transition:"border-color .2s"}}/>
        <button onClick={send} style={{width:40,height:40,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 2px 8px rgba(99,102,241,.4)"}}>←</button>
      </div>
    </div>
  );
});

// MAIN APP
// ══════════════════════════════════════════════════════════
function App(){
  const{dark,toggle:toggleDark}=useTheme();
  const th=T(dark);
  const[ready,setReady]=useState(window.__fbReady||false);
  const[me,setMe]=useState(()=>{try{return localStorage.getItem("nbu")||null;}catch{return null;}});
  const[screen,setScreen]=useState(me?"home":"auth");
  const[activeId,setActiveId]=useState(null);
  const[users,setUsers]=useState({});const[groups,setGroups]=useState({});
  const[msgs,setMsgs]=useState([]);const[dmChats,setDmChats]=useState({});
  const[stories,setStories]=useState({});const[presence,setPresence]=useState({});
  const[friendReqs,setFriendReqs]=useState({});const[typingMap,setTypingMap]=useState({});
  const[unreadMap,setUnreadMap]=useState({});
  // Chat customization
  const[chatBgs,setChatBgs]=useState(()=>{try{return JSON.parse(localStorage.getItem("chatBgs")||"{}");}catch{return{};}});
  const[bubbleColors,setBubbleColors]=useState(()=>{try{return JSON.parse(localStorage.getItem("bubbleColors")||"{}");}catch{return{};}});

  const[aMode,setAMode]=useState("login");const[aUser,setAUser]=useState("");const[aPass,setAPass]=useState("");const[aErr,setAErr]=useState("");
  const[ngName,setNgName]=useState("");const[jCode,setJCode]=useState("");const[jErr,setJErr]=useState("");
  const[panel,setPanel]=useState(false);const[tab,setTab]=useState("chats");
  const[vImg,setVImg]=useState(null);const[stIn,setStIn]=useState(null);const[vStory,setVStory]=useState(null);
  const[showSettings,setShowSettings]=useState(false);
  const[editingProfile,setEditingProfile]=useState(false);
  const[eEmoji,setEEmoji]=useState("");const[eBio,setEBio]=useState("");const[eName,setEName]=useState("");const[ePhoto,setEPhoto]=useState(null);
  const[showFriends,setShowFriends]=useState(false);const[friendSearch,setFriendSearch]=useState("");
  const[copied,setCopied]=useState(false);const[showNdm,setShowNdm]=useState(false);const[ndmU,setNdmU]=useState("");
  const[showCustomize,setShowCustomize]=useState(false);
  const[groupEdit,setGroupEdit]=useState(false);const[gNewName,setGNewName]=useState("");const[gNewPhoto,setGNewPhoto]=useState(null);

  const stRef=useRef(null);const phRef=useRef(null);const gPhRef=useRef(null);const bgRef=useRef(null);
  const pLen=useRef(0);const typingRef=useRef(null);

  useEffect(()=>{if(window.__fbReady){setReady(true);return;}window.addEventListener('fbReady',()=>setReady(true));},[]);

  const login=u=>{setMe(u);try{localStorage.setItem("nbu",u);}catch{}setScreen("home");requestNotifPerm();setPresenceOnline(u);};
  const logout=async()=>{if(me){await dSet(`presence/${me}`,{online:false,last:Date.now()});try{localStorage.removeItem("nbu");}catch{}}setMe(null);setScreen("auth");setActiveId(null);};

  const setPresenceOnline=useCallback(u=>{
    if(!u)return;

        <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:14}}>👥</div>
          <h2 style={{fontWeight:800,fontSize:20,marginBottom:8,color:th.text}}>مجموعة جديدة</h2>
          <p style={{color:th.text3,fontSize:13,marginBottom:20}}>ستكون المشرف تلقائياً</p>
          <input value={ngName} onChange={e=>setNgName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&mkGrp()} placeholder="اسم المجموعة..." style={{...I,marginBottom:14}}/>
          <button onClick={mkGrp} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),width:"100%",fontSize:15,borderRadius:14}}>إنشاء ←</button>
        </div>
      </div>}

      {/* JOIN */}
      {screen==="join"&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
          <div style={{fontSize:52,marginBottom:14}}>🔗</div>
          <h2 style={{fontWeight:800,fontSize:20,marginBottom:8,color:th.text}}>الانضمام لمجموعة</h2>
          <p style={{color:th.text3,fontSize:13,marginBottom:20}}>رمز الدعوة أو معرّف المجموعة</p>
          <input value={jCode} onChange={e=>setJCode(e.target.value)} placeholder="ادخل الرمز..." style={{...I,marginBottom:12}}/>
          {jErr&&<div style={{marginBottom:12,padding:"9px 14px",background:jErr.startsWith("✅")?"#f0fdf4":"#fef2f2",borderRadius:10,color:jErr.startsWith("✅")?"#22c55e":"#ef4444",fontSize:13,fontWeight:600}}>{jErr}</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={joinInv} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),flex:1,fontSize:13,borderRadius:12}}>انضمام برمز</button>
            <button onClick={reqJoin} style={{...B(th.card2,dark?"#a5b4fc":"#6366f1",{flex:1,fontSize:13,border:`1px solid ${th.border}`,borderRadius:12})}}>إرسال طلب</button>
          </div>
        </div>
      </div>}

      {/* DM */}
      {screen==="dm"&&activeId&&<>
        <MsgList msgs={msgs} me={me} isGroup={false} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} typingUsers={typingUsers} chatBg={currentChatBg} bubbleColor={currentBubbleColor} th={th} dark={dark}
          empty={<div style={{textAlign:"center",marginTop:60,color:th.text3}}><div style={{fontSize:44}}>👋</div><div style={{fontSize:14,marginTop:8}}>ابدأ المحادثة مع {activeId}</div></div>}/>
        <ChatInp ph={`رسالة إلى ${activeId}...`} onSend={sendD} onMedia={medD} onTyping={handleTyping} th={th}/>
      </>}

      {/* GROUP */}
      {screen==="group"&&ag&&<div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <MsgList msgs={msgs} me={me} isGroup={true} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} typingUsers={typingUsers} chatBg={currentChatBg} bubbleColor={currentBubbleColor} th={th} dark={dark}
            empty={<div style={{textAlign:"center",marginTop:50,color:th.text3}}><div style={{fontSize:44}}>💬</div><div style={{fontSize:14,marginTop:8}}>لا توجد رسائل بعد</div>{ag.admin===me&&<div style={{marginTop:14,padding:"14px",background:th.card,borderRadius:14,border:`1px solid ${th.border}`,display:"inline-block"}}><div style={{color:"#6366f1",fontSize:12,fontWeight:700,marginBottom:4}}>🔗 رمز الدعوة</div><div style={{fontFamily:"monospace",color:"#22c55e",fontSize:15,letterSpacing:"2px",fontWeight:700}}>{ag.inviteCode}</div></div>}</div>}/>
          <ChatInp ph={`رسالة في ${ag.name}...`} onSend={sendG} onMedia={medG} onTyping={handleTyping} th={th}/>
        </div>
        {panel&&<div style={{width:220,background:th.topbar,borderRight:`1px solid ${th.border}`,overflowY:"auto",flexShrink:0}}>
          <div style={{padding:"12px 14px",fontWeight:700,fontSize:11,color:th.text3,borderBottom:`1px solid ${th.border}`,letterSpacing:"1px"}}>{ag.admin===me?"🛡️ الإدارة":"👥 الأعضاء"}</div>
          {ag.admin===me&&<div style={{padding:"10px 14px",borderBottom:`1px solid ${th.border}`}}>
            {/* Group edit */}
            {!groupEdit?<button onClick={()=>{setGroupEdit(true);setGNewName(ag.name);}} style={{...B(th.card2,th.text,{width:"100%",fontSize:12,border:`1px solid ${th.border}`,marginBottom:8})}}>✏️ تعديل المجموعة</button>
            :<div>
              <input value={gNewName} onChange={e=>setGNewName(e.target.value)} placeholder="اسم جديد..." style={{...I,fontSize:12,marginBottom:6}}/>
              <div style={{display:"flex",gap:4,marginBottom:6}}>
                <button onClick={()=>gPhRef.current.click()} style={{...B(th.card2,th.text,{flex:1,fontSize:11,border:`1px solid ${th.border}`,padding:"6px"})}}>📷 صورة</button>
                <input ref={gPhRef} type="file" accept="image/*" style={{display:"none"}} onChange={hGPhoto}/>
                {gNewPhoto&&<img src={gNewPhoto} style={{width:32,height:32,borderRadius:6,objectFit:"cover"}}/>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>saveGroupEdit(ag.id)} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)","#fff",{flex:1,fontSize:11,padding:"7px"})}}>حفظ</button>
                <button onClick={()=>setGroupEdit(false)} style={{...B(th.card2,th.text,{flex:1,fontSize:11,padding:"7px",border:`1px solid ${th.border}`})}}>إلغاء</button>
              </div>
            </div>}
            {/* Invite */}
            <div style={{fontSize:10,color:th.text3,fontWeight:700,marginBottom:4,marginTop:4}}>رمز الدعوة</div>
            <div style={{fontFamily:"monospace",fontSize:11,padding:"7px 10px",background:th.card2,borderRadius:8,color:ag.inviteActive?"#22c55e":th.text3,wordBreak:"break-all",marginBottom:6,border:`1px solid ${th.border}`}}>{ag.inviteActive?ag.inviteCode:"🔒 مغلق"}</div>
            <div style={{fontSize:10,color:th.text3,marginBottom:8}}>ID: <span style={{color:"#6366f1",fontFamily:"monospace"}}>{ag.id}</span></div>
            <div style={{display:"flex",gap:5}}>
              {ag.inviteActive&&<button onClick={()=>{try{navigator.clipboard.writeText(ag.inviteCode);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{flex:1,padding:"6px",background:copied?"#f0fdf4":th.card2,border:`1px solid ${copied?"#22c55e":th.border}`,borderRadius:8,color:copied?"#22c55e":th.text2,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{copied?"✓ تم":"نسخ"}</button>}
              <button onClick={()=>togInv(ag.id,ag.inviteActive)} style={{flex:1,padding:"6px",background:th.card2,border:`1px solid ${th.border}`,borderRadius:8,color:ag.inviteActive?"#ef4444":"#22c55e",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{ag.inviteActive?"إغلاق":"فتح"}</button>
            </div>
            <button onClick={()=>deleteGroup(ag.id)} style={{...B(dark?"#1e1e2e":"#fff","#ef4444",{width:"100%",marginTop:8,fontSize:11,border:"1px solid #fecaca"})}}>🗑 حذف المجموعة</button>
          </div>}
          {/* Add member */}
          {ag.admin===me&&<div style={{padding:"8px 14px",borderBottom:`1px solid ${th.border}`}}>
            <AddMemberInline gid={ag.id} onAdd={addMember} th={th} I={I} B={B}/>
          </div>}
          {/* Pending */}
          {ag.admin===me&&agP.length>0&&<div style={{padding:"8px 14px",borderBottom:`1px solid ${th.border}`}}>
            <div style={{fontSize:10,color:"#ef4444",fontWeight:700,marginBottom:6}}>طلبات ({agP.length})</div>
            {agP.map(u=><div key={u} style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
              <Av user={users[u]} size={24}/><span style={{flex:1,fontSize:12,color:th.text}}>{u}</span>
              <button onClick={()=>approve(ag.id,u)} style={{background:"#f0fdf4",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#22c55e",fontSize:13}}>✓</button>
              <button onClick={()=>reject(ag.id,u)} style={{background:"#fef2f2",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#ef4444",fontSize:13}}>✗</button>
            </div>)}
          </div>}
          {/* Members */}
          <div style={{padding:"8px 14px"}}>
            <div style={{fontSize:10,color:th.text3,fontWeight:700,marginBottom:8}}>الأعضاء ({agM.length})</div>
            {agM.map(u=><div key={u} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av user={users[u]} size={36} online={isOnline(u)}/></button>
              <div style={{flex:1,minWidth:0}}>
                <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"right",width:"100%"}}>
                  <div style={{fontSize:13,fontWeight:u===ag.admin?700:400,color:th.text}}>{u}</div>
                  <div style={{fontSize:10,color:isOnline(u)?"#22c55e":th.text3}}>{lastSeen(u)}</div>
                </button>
                {u===ag.admin&&<div style={{fontSize:10,color:"#f59e0b",fontWeight:700}}>👑 مشرف</div>}
              </div>
              {ag.admin===me&&u!==me&&<button onClick={()=>kick(ag.id,u)} style={{background:"none",border:"none",cursor:"pointer",color:th.text3,fontSize:16}}>🚫</button>}
            </div>)}
          </div>
        </div>}
      </div>}
    </div>
  );
}

// Add member inline component
function AddMemberInline({gid,onAdd,th,I,B}){
  const[v,setV]=useState("");
  return<div style={{display:"flex",gap:5}}>
    <input value={v} onChange={e=>setV(e.target.value)} placeholder="+ إضافة عضو..." style={{...I,flex:1,padding:"7px 10px",fontSize:12}}/>
    <button onClick={()=>{onAdd(gid,v);setV("");}} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)","#fff",{padding:"7px 10px",fontSize:12})}}>+</button>
  </div>;
}

function Root(){
  const[r,setR]=useState(window.__fbReady||false);
  useEffect(()=>{if(!window.__fbReady)window.addEventListener('fbReady',()=>setR(true));else setR(true);},[]);
  if(!r)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5",flexDirection:"column",gap:12}}><div style={{width:56,height:56,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>💬</div><div style={{color:"#6b7280",fontSize:14}}>جاري الاتصال...</div></div>;
  return<App/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
