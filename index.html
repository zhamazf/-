<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="نبضة"/>
<link rel="manifest" href="manifest.json"/>
<title>نبضة Chat</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:#0a0a14;font-family:'Segoe UI','Cairo',sans-serif}
input:focus,textarea:focus{border-color:#6366f1!important;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:#555;font-size:12px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;font-weight:600}
.tab-btn.active{color:#a5b4fc;border-bottom-color:#6366f1}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import{getDatabase,ref,set,get,push,onValue,off,update,remove}from"https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBqRplVWgiZUXkbujiQ-KWNca6dPwC-kOk",authDomain:"nabda-chat.firebaseapp.com",databaseURL:"https://nabda-chat-default-rtdb.firebaseio.com",projectId:"nabda-chat",storageBucket:"nabda-chat.firebasestorage.app",messagingSenderId:"399164736455",appId:"1:399164736455:web:127df9589215b9e8120fe2"};
const app=initializeApp(cfg);const db=getDatabase(app);
window.__db=db;window.__fn={ref,set,get,push,onValue,off,update,remove};
window.__fbReady=true;window.dispatchEvent(new Event('fbReady'));
</script>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback,memo}=React;
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
const COLORS=["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#c084fc","#FF9F43","#54A0FF","#f472b6"];
const uc=n=>n?COLORS[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length]:"#6366f1";
const D=()=>window.__db;const F=()=>window.__fn;
const dSet=(p,v)=>F().set(F().ref(D(),p),v);
const dUpd=(p,v)=>F().update(F().ref(D(),p),v);
const dPush=(p,v)=>F().push(F().ref(D(),p),v);
const dGet=async p=>{const s=await F().get(F().ref(D(),p));return s.exists()?s.val():null;};
const dListen=(p,cb)=>{const r=F().ref(D(),p);F().onValue(r,s=>cb(s.val()));return()=>F().off(r);};
const dDel=p=>F().remove(F().ref(D(),p));

const snd=type=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);if(type==="send"){o.frequency.setValueAtTime(800,c.currentTime);o.frequency.exponentialRampToValueAtTime(600,c.currentTime+0.1);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start();o.stop(c.currentTime+0.1);}else if(type==="recv"){o.frequency.setValueAtTime(500,c.currentTime);o.frequency.setValueAtTime(700,c.currentTime+0.1);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start();o.stop(c.currentTime+0.2);}}catch{}};

const Av=memo(({user,size=36,onClick,ring=false,seen=false})=>{
  const name=user?.username||"?";const c=uc(name);
  const inner=user?.photo
    ?<img src={user.photo} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block"}}/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${c}cc,${c}55)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:user?.emoji?size*.52:size*.42,fontWeight:800,color:"#fff",userSelect:"none"}}>{user?.emoji||name[0]?.toUpperCase()}</div>;
  if(ring)return<div onClick={onClick} style={{cursor:onClick?"pointer":"default",flexShrink:0,padding:2,borderRadius:"50%",border:`2.5px solid ${seen?"#333":"#6366f1"}`,display:"inline-flex"}}>{inner}</div>;
  return<div onClick={onClick} style={{cursor:onClick?"pointer":"default",flexShrink:0,display:"inline-flex"}}>{inner}</div>;
});

const ImgViewer=({src,onClose})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000d",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <img src={src} style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:8}} onClick={e=>e.stopPropagation()}/>
    <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"#fff2",border:"none",color:"#fff",fontSize:24,cursor:"pointer",borderRadius:"50%",width:40,height:40}}>✕</button>
  </div>
);

const MsgContent=memo(({msg,onImg})=>{
  const[play,setPlay]=useState(false);const ar=useRef(null);
  if(msg.type==="image")return<img src={msg.data} style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block",cursor:"pointer"}} onClick={()=>onImg&&onImg(msg.data)}/>;
  if(msg.type==="video")return<video src={msg.data} controls playsInline style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block"}}/>;
  if(msg.type==="voice"){
    const tog=()=>{if(!ar.current)return;if(play){ar.current.pause();setPlay(false);}else{ar.current.play().catch(()=>{});setPlay(true);}};
    return<div style={{display:"flex",alignItems:"center",gap:10,minWidth:160}}><audio ref={ar} src={msg.data} onEnded={()=>setPlay(false)}/><button onClick={tog} style={{width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:"rgba(255,255,255,.2)",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>{play?"⏸":"▶"}</button><div><div style={{fontSize:12,opacity:.8}}>صوتية</div>{msg.duration>0&&<div style={{fontSize:10,opacity:.5}}>{msg.duration}ث</div>}</div></div>;
  }
  return<span style={{wordBreak:"break-word"}}>{msg.text}</span>;
});

const Bubble=memo(({msg,me,isGroup,users,onImg,onAv})=>{
  const mine=msg.sender===me;const sender=users[msg.sender]||{username:msg.sender};
  const isMedia=["image","video","voice"].includes(msg.type);
  return(
    <div style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:6,marginBottom:6}}>
      {!mine&&<div onClick={()=>onAv&&onAv(msg.sender)} style={{cursor:"pointer"}}><Av user={sender} size={26}/></div>}
      <div style={{maxWidth:"78%"}}>
        {!mine&&isGroup&&<div style={{fontSize:10,color:uc(msg.sender),fontWeight:700,marginBottom:2}}>{msg.sender}</div>}
        <div style={{padding:isMedia?"6px":"9px 13px",borderRadius:mine?"18px 18px 4px 18px":"18px 18px 18px 4px",background:mine?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e1e2e",color:mine?"#fff":"#d4d4e8",fontSize:14,lineHeight:1.5,boxShadow:mine?"0 3px 10px #6366f144":"0 2px 6px #0006"}}>
          <MsgContent msg={msg} onImg={onImg}/>
        </div>
        <div style={{fontSize:10,color:"#444",marginTop:2,textAlign:mine?"left":"right"}}>{fmt(msg.ts)}</div>
      </div>
    </div>
  );
});

const MsgList=memo(({msgs,me,isGroup,users,empty,onImg,onAv})=>{
  const bot=useRef(null);const pLen=useRef(0);
  useEffect(()=>{if(msgs.length!==pLen.current){bot.current?.scrollIntoView({behavior:"smooth"});pLen.current=msgs.length;}},[msgs.length]);
  return<div style={{flex:1,overflowY:"auto",padding:"14px 14px 4px"}}>{msgs.length===0&&empty}{msgs.map(m=><Bubble key={m.id||m.ts} msg={m} me={me} isGroup={isGroup} users={users} onImg={onImg} onAv={onAv}/>)}<div ref={bot}/></div>;
});

const ChatInp=memo(({ph,onSend,onMedia})=>{
  const[val,setVal]=useState("");const[mode,setMode]=useState("text");
  const[rec,setRec]=useState(false);const[rs,setRs]=useState(0);const[rd,setRd]=useState(null);
  const mr=useRef(null);const tr=useRef(null);const rr=useRef(0);
  const ir=useRef(null);const vr=useRef(null);
  const send=useCallback(()=>{if(!val.trim())return;onSend(val.trim());setVal("");snd("send");},[val,onSend]);
  const hImg=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>onMedia("image",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const hVid=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>onMedia("video",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const startR=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({audio:true});const m=new MediaRecorder(s);const ch=[];m.ondataavailable=e=>ch.push(e.data);m.onstop=()=>{s.getTracks().forEach(t=>t.stop());const b=new Blob(ch,{type:"audio/webm"});const r=new FileReader();r.onload=()=>setRd({data:r.result,duration:rr.current});r.readAsDataURL(b);};m.start();mr.current=m;setRec(true);setRs(0);rr.current=0;tr.current=setInterval(()=>{rr.current+=1;setRs(s=>s+1);},1000);}catch{alert("تعذّر الوصول للميكروفون");}};
  const stopR=()=>{if(!mr.current||mr.current.state==="inactive")return;mr.current.stop();clearInterval(tr.current);setRec(false);};
  const sendV=()=>{if(!rd)return;onMedia("voice",rd.data,rd.duration);setRd(null);setMode("text");snd("send");};
  return(
    <div style={{background:"#12121e",borderTop:"1px solid #1e1e30",flexShrink:0}}>
      {mode==="media"&&<div style={{padding:"12px 12px 0",display:"flex",gap:8}}>
        <button onClick={()=>ir.current.click()} style={{flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:28}}>🖼</span><span>صورة</span></button>
        <button onClick={()=>vr.current.click()} style={{flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:28}}>🎥</span><span>فيديو</span></button>
        <button onClick={()=>setMode("voice")} style={{flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:28}}>🎙</span><span>صوتية</span></button>
        <input ref={ir} type="file" accept="image/*" style={{display:"none"}} onChange={hImg}/>
        <input ref={vr} type="file" accept="video/*" style={{display:"none"}} onChange={hVid}/>
      </div>}
      {mode==="voice"&&<div style={{padding:"16px 14px"}}>
        {!rec&&!rd&&<div style={{textAlign:"center"}}><p style={{color:"#888",fontSize:13,marginBottom:12}}>اضغط للتسجيل</p><button onClick={startR} style={{width:70,height:70,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",cursor:"pointer",fontSize:30,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🎙</button></div>}
        {rec&&<div style={{textAlign:"center"}}><div style={{color:"#ff9090",fontSize:14,marginBottom:10}}>🔴 {rs}ث</div><div style={{display:"flex",justifyContent:"center",gap:12}}><button onClick={stopR} style={{padding:"12px 24px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>⏹ إيقاف</button><button onClick={()=>{stopR();setTimeout(()=>{setRd(null);setRec(false);setRs(0);},300);}} style={{padding:"12px 24px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#ff9090",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕</button></div></div>}
        {rd&&!rec&&<div style={{textAlign:"center"}}><div style={{color:"#4ade80",fontSize:13,marginBottom:10}}>✅ {rd.duration}ث</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={sendV} style={{padding:"12px 28px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>إرسال ←</button><button onClick={()=>{setRd(null);setMode("text");}} style={{padding:"12px 20px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#ff9090",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>إلغاء</button></div></div>}
      </div>}
      <div style={{padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
        <button onClick={()=>setMode(mode==="text"?"media":"text")} style={{width:42,height:42,flexShrink:0,background:mode!=="text"?"#6366f133":"#1e1e2e",border:`1px solid ${mode!=="text"?"#6366f1":"#2a2a3e"}`,borderRadius:12,cursor:"pointer",color:mode!=="text"?"#a5b4fc":"#666",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{mode!=="text"?"✕":"+"}</button>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder={ph} style={{flex:1,padding:"11px 14px",background:"#1e1e2e",border:"1.5px solid #2a2a3e",borderRadius:12,color:"#e0e0f0",fontSize:14,fontFamily:"inherit",outline:"none",direction:"rtl"}}/>
        <button onClick={send} style={{width:42,height:42,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,cursor:"pointer",color:"#fff",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
      </div>
    </div>
  );
});

function App(){
  const[ready,setReady]=useState(window.__fbReady||false);
  const[me,setMe]=useState(()=>{try{return localStorage.getItem("nbu")||null;}catch{return null;}});
  const[screen,setScreen]=useState(me?"home":"auth");
  const[activeId,setActiveId]=useState(null);
  const[users,setUsers]=useState({});const[groups,setGroups]=useState({});
  const[msgs,setMsgs]=useState([]);const[dmChats,setDmChats]=useState({});
  const[stories,setStories]=useState({});
  const[aMode,setAMode]=useState("login");const[aUser,setAUser]=useState("");const[aPass,setAPass]=useState("");const[aErr,setAErr]=useState("");
  const[ngName,setNgName]=useState("");const[jCode,setJCode]=useState("");const[jErr,setJErr]=useState("");
  const[panel,setPanel]=useState(false);const[ndmU,setNdmU]=useState("");const[showNdm,setShowNdm]=useState(false);
  const[copied,setCopied]=useState(false);
  const[eEmoji,setEEmoji]=useState("");const[eBio,setEBio]=useState("");const[ePhoto,setEPhoto]=useState(null);
  const[tab,setTab]=useState("chats");const[vImg,setVImg]=useState(null);
  const[stIn,setStIn]=useState(null);const[vStory,setVStory]=useState(null);
  const stRef=useRef(null);const phRef=useRef(null);const pLen=useRef(0);

  useEffect(()=>{if(window.__fbReady){setReady(true);return;}window.addEventListener('fbReady',()=>setReady(true));},[]);

  const login=u=>{setMe(u);try{localStorage.setItem("nbu",u);}catch{}setScreen("home");};
  const logout=()=>{setMe(null);try{localStorage.removeItem("nbu");}catch{}setScreen("auth");setActiveId(null);};

  useEffect(()=>{
    const h=e=>{if(screen!=="home"&&screen!=="auth"){e.preventDefault();go("home");}};
    window.addEventListener("popstate",h);
    if(screen!=="home"&&screen!=="auth")window.history.pushState({},"","");
    return()=>window.removeEventListener("popstate",h);
  },[screen]);

  useEffect(()=>{if(!ready)return;
    const u1=dListen("users",v=>setUsers(v||{}));
    const u2=dListen("groups",v=>setGroups(v||{}));
    const u3=dListen("stories",v=>setStories(v||{}));
    const u4=dListen("dmMsgs",v=>setDmChats(v||{}));
    return()=>[u1,u2,u3,u4].forEach(u=>u());
  },[ready]);

  useEffect(()=>{if(!ready||!stories)return;const now=Date.now();Object.entries(stories).forEach(([u,us])=>{if(!us)return;Object.entries(us).forEach(([sid,s])=>{if(now-s.ts>86400000)dDel(`stories/${u}/${sid}`);});});},[stories]);

  useEffect(()=>{
    if(!me||!activeId)return;
    let path="";
    if(screen==="group")path=`groupMsgs/${activeId}`;
    else if(screen==="dm")path=`dmMsgs/${[me,activeId].sort().join("_")}`;
    else return;
    const unsub=dListen(path,v=>{
      if(!v){setMsgs([]);return;}
      const arr=Object.entries(v).map(([id,m])=>({...m,id})).sort((a,b)=>a.ts-b.ts);
      if(arr.length>pLen.current&&pLen.current>0){const last=arr[arr.length-1];if(last.sender!==me)snd("recv");}
      pLen.current=arr.length;setMsgs(arr);
    });
    return unsub;
  },[me,activeId,screen]);

  const go=useCallback((s,id=null)=>{setScreen(s);setActiveId(id);setPanel(false);setJErr("");setJCode("");pLen.current=0;if(s!=="auth")window.history.pushState({},"","");},[]);
  const md=me?users[me]:null;

  const auth=async()=>{
    setAErr("");const u=aUser.trim(),p=aPass.trim();
    if(!u||!p)return setAErr("أدخل الاسم وكلمة المرور");
    if(aMode==="login"){const d=await dGet(`users/${u}`);if(!d)return setAErr("المستخدم غير موجود");if(d.password!==p)return setAErr("كلمة المرور خاطئة");login(u);}
    else{const e=await dGet(`users/${u}`);if(e)return setAErr("الاسم محجوز");if(u.length<2)return setAErr("الاسم قصير");await dSet(`users/${u}`,{username:u,password:p,emoji:"",bio:"",photo:null});login(u);}
  };

  const sendG=useCallback(async t=>{await dPush(`groupMsgs/${activeId}`,{sender:me,type:"text",text:t,ts:Date.now()});snd("send");},[activeId,me]);
  const sendD=useCallback(async t=>{const c=[me,activeId].sort().join("_");await dPush(`dmMsgs/${c}`,{sender:me,type:"text",text:t,ts:Date.now()});snd("send");},[activeId,me]);
  const medG=useCallback(async(tp,d,dur=0)=>{await dPush(`groupMsgs/${activeId}`,{sender:me,type:tp,data:d,duration:dur,ts:Date.now()});snd("send");},[activeId,me]);
  const medD=useCallback(async(tp,d,dur=0)=>{const c=[me,activeId].sort().join("_");await dPush(`dmMsgs/${c}`,{sender:me,type:tp,data:d,duration:dur,ts:Date.now()});snd("send");},[activeId,me]);

  const mkGrp=async()=>{if(!ngName.trim())return;const gid=uid(),inv=uid();await dSet(`groups/${gid}`,{id:gid,name:ngName.trim(),admin:me,members:{[me]:true},pending:{},inviteCode:inv,inviteActive:true});setNgName("");go("group",gid);};
  const joinInv=async()=>{setJErr("");const code=jCode.trim();const all=await dGet("groups");if(!all)return setJErr("لا توجد مجموعات");const g=Object.values(all).find(g=>g.inviteCode===code&&g.inviteActive);if(!g)return setJErr("رمز الدعوة غير صالح");if(g.members&&g.members[me]){go("group",g.id);return;}await dUpd(`groups/${g.id}/members`,{[me]:true});if(g.pending&&g.pending[me])await dDel(`groups/${g.id}/pending/${me}`);go("group",g.id);setJCode("");};
  const reqJoin=async()=>{setJErr("");const gid=jCode.trim();const g=await dGet(`groups/${gid}`);if(!g)return setJErr("المعرّف غير موجود");if(g.members&&g.members[me])return setJErr("أنت بالفعل عضو");if(g.pending&&g.pending[me])return setJErr("طلبك قيد الانتظار");await dUpd(`groups/${gid}/pending`,{[me]:true});setJErr("✅ تم إرسال الطلب!");};
  const approve=(gid,u)=>{dUpd(`groups/${gid}/members`,{[u]:true});dDel(`groups/${gid}/pending/${u}`);};
  const reject=(gid,u)=>dDel(`groups/${gid}/pending/${u}`);
  const kick=(gid,u)=>dDel(`groups/${gid}/members/${u}`);
  const togInv=(gid,cur)=>dUpd(`groups/${gid}`,{inviteActive:!cur});

  const openProf=()=>{setEEmoji(md?.emoji||"");setEBio(md?.bio||"");setEPhoto(md?.photo||null);go("profile");};
  const saveProf=async()=>{await dUpd(`users/${me}`,{emoji:eEmoji,bio:eBio.trim(),photo:ePhoto||null});go("home");};
  const hPhoto=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>setEPhoto(r.result);r.readAsDataURL(f);};
  const hStory=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>setStIn(r.result);r.readAsDataURL(f);e.target.value="";};
  const postStory=async()=>{if(!stIn)return;await dPush(`stories/${me}`,{data:stIn,ts:Date.now(),type:"image"});setStIn(null);};
  const markSeen=u=>{try{const s=JSON.parse(localStorage.getItem("ns")||"{}");s[u]=Date.now();localStorage.setItem("ns",JSON.stringify(s));}catch{}};
  const isSeen=u=>{try{const s=JSON.parse(localStorage.getItem("ns")||"{}");const ls=s[u]||0;const us=stories[u];if(!us)return true;const last=Math.max(...Object.values(us).map(x=>x.ts));return ls>last;}catch{return false;}};

      {/* DM */}
      {screen==="dm"&&activeId&&<>
        <MsgList msgs={msgs} me={me} isGroup={false} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} empty={<div style={{textAlign:"center",marginTop:60,color:"#333"}}><div style={{fontSize:40}}>👋</div><div style={{fontSize:14,marginTop:8}}>ابدأ المحادثة مع {activeId}</div></div>}/>
        <ChatInp ph={`رسالة إلى ${activeId}...`} onSend={sendD} onMedia={medD}/>
      </>}

      {/* GROUP */}
      {screen==="group"&&ag&&<div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <MsgList msgs={msgs} me={me} isGroup={true} users={users} onImg={src=>setVImg(src)} onAv={u=>go("userProfile",u)} empty={
            <div style={{textAlign:"center",marginTop:50,color:"#333"}}>
              <div style={{fontSize:40}}>💬</div><div style={{fontSize:14,marginTop:8}}>لا توجد رسائل بعد</div>
              {ag.admin===me&&<div style={{marginTop:14,padding:"14px",background:"#1e1e2e",borderRadius:14,display:"inline-block"}}><div style={{color:"#a5b4fc",fontSize:12,fontWeight:700,marginBottom:4}}>🔗 رمز الدعوة</div><div style={{fontFamily:"monospace",color:"#4ade80",fontSize:15,letterSpacing:"2px",fontWeight:700}}>{ag.inviteCode}</div></div>}
            </div>}/>
          <ChatInp ph={`رسالة في ${ag.name}...`} onSend={sendG} onMedia={medG}/>
        </div>
        {panel&&<div style={{width:220,background:"#0e0e18",borderRight:"1px solid #1e1e30",overflowY:"auto",flexShrink:0}}>
          <div style={{padding:"12px 14px",fontWeight:700,fontSize:11,color:"#555",borderBottom:"1px solid #1e1e30"}}>{ag.admin===me?"🛡️ الإدارة":"👥 الأعضاء"}</div>
          {ag.admin===me&&<div style={{padding:"10px 14px",borderBottom:"1px solid #1a1a2e"}}>
            <div style={{fontSize:10,color:"#444",fontWeight:700,marginBottom:6}}>رمز الدعوة</div>
            <div style={{fontFamily:"monospace",fontSize:11,padding:"7px 10px",background:"#1a1a2e",borderRadius:8,color:ag.inviteActive?"#4ade80":"#555",wordBreak:"break-all",marginBottom:6}}>{ag.inviteActive?ag.inviteCode:"🔒 مغلق"}</div>
            <div style={{fontSize:10,color:"#444",marginBottom:8}}>المعرّف: <span style={{color:"#6366f1",fontFamily:"monospace"}}>{ag.id}</span></div>
            <div style={{display:"flex",gap:6}}>
              {ag.inviteActive&&<button onClick={()=>{try{navigator.clipboard.writeText(ag.inviteCode);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{flex:1,padding:"6px",background:copied?"#4ade8022":"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:8,color:copied?"#4ade80":"#888",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{copied?"✓":"نسخ"}</button>}
              <button onClick={()=>togInv(ag.id,ag.inviteActive)} style={{flex:1,padding:"6px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:8,color:ag.inviteActive?"#ff9090":"#4ade80",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{ag.inviteActive?"إغلاق":"فتح"}</button>
            </div>
          </div>}
          {ag.admin===me&&agP.length>0&&<div style={{padding:"10px 14px",borderBottom:"1px solid #1a1a2e"}}>
            <div style={{fontSize:10,color:"#ff9090",fontWeight:700,marginBottom:8}}>طلبات ({agP.length})</div>
            {agP.map(u=><div key={u} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><Av user={users[u]} size={24}/><span style={{flex:1,fontSize:12}}>{u}</span><button onClick={()=>approve(ag.id,u)} style={{background:"#4ade8022",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#4ade80",fontSize:13}}>✓</button><button onClick={()=>reject(ag.id,u)} style={{background:"#ff6b6b22",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#ff9090",fontSize:13}}>✗</button></div>)}
          </div>}
          <div style={{padding:"10px 14px"}}>
            <div style={{fontSize:10,color:"#444",fontWeight:700,marginBottom:8}}>الأعضاء ({agM.length})</div>
            {agM.map(u=><div key={u} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av user={users[u]} size={36}/></button>
              <div style={{flex:1,minWidth:0}}>
                <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"right",width:"100%"}}>
                  <div style={{fontSize:13,fontWeight:u===ag.admin?700:400,color:"#e0e0f0"}}>{u}</div>
                  {users[u]?.bio&&<div style={{fontSize:10,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{users[u].bio}</div>}
                </button>
                {u===ag.admin&&<div style={{fontSize:10,color:"#FFD93D"}}>👑 مشرف</div>}
              </div>
              {ag.admin===me&&u!==me&&<button onClick={()=>kick(ag.id,u)} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:15}}>🗑</button>}
            </div>)}
          </div>
        </div>}
      </div>}
    </div>
  );
}

function Root(){const[r,setR]=useState(window.__fbReady||false);useEffect(()=>{if(!window.__fbReady)window.addEventListener('fbReady',()=>setR(true));else setR(true);},[]);if(!r)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a14",color:"#6366f1",fontSize:20}}>💬 جاري الاتصال...</div>;return<App/>;}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
