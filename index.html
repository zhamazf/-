<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="نبضة"/>
<link rel="manifest" href="manifest.json"/>
<title>نبضة Chat</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:#0a0a14;font-family:'Segoe UI','Cairo',sans-serif}
input:focus,textarea:focus{border-color:#6366f1!important;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
</style>

<body>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a14;color:#6366f1;font-size:24px">⏳ جاري التحميل...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, off, update, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqRplVWgiZUXkbujiQ-KWNca6dPwC-kOk",
  authDomain: "nabda-chat.firebaseapp.com",
  databaseURL: "https://nabda-chat-default-rtdb.firebaseio.com",
  projectId: "nabda-chat",
  storageBucket: "nabda-chat.firebasestorage.app",
  messagingSenderId: "399164736455",
  appId: "1:399164736455:web:127df9589215b9e8120fe2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window.__db = db;
window.__dbFns = { ref, set, get, push, onValue, off, update, remove };
window.__firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, memo } = React;

const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (ts) => new Date(ts).toLocaleTimeString("ar", { hour: "2-digit", minute: "2-digit" });
const COLORS = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#c084fc","#FF9F43","#54A0FF","#f472b6"];
const uc = (n) => n ? COLORS[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0) % COLORS.length] : "#6366f1";

// ── DB helpers ────────────────────────────────────────────────────────────────
const db = () => window.__db;
const fn = () => window.__dbFns;

const dbSet   = (path, val) => fn().set(fn().ref(db(), path), val);
const dbUpdate= (path, val) => fn().update(fn().ref(db(), path), val);
const dbPush  = (path, val) => fn().push(fn().ref(db(), path), val);
const dbGet   = async (path) => { const s = await fn().get(fn().ref(db(), path)); return s.exists() ? s.val() : null; };
const dbListen= (path, cb) => { const r = fn().ref(db(), path); fn().onValue(r, s => cb(s.val())); return () => fn().off(r); };
const dbRemove= (path) => fn().remove(fn().ref(db(), path));

// ── Avatar ────────────────────────────────────────────────────────────────────
const Avatar = memo(({ user, size=36 }) => {
  const name = user?.username || "?";
  const c = uc(name);
  if (user?.photo) return <img src={user.photo} alt={name} style={{ width:size, height:size, borderRadius:"50%", objectFit:"cover", flexShrink:0, border:`2px solid ${c}44` }} />;
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", flexShrink:0, background:`linear-gradient(135deg,${c}cc,${c}55)`, border:`2px solid ${c}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:user?.emoji?size*0.52:size*0.42, fontWeight:800, color:"#fff", userSelect:"none" }}>
      {user?.emoji || name[0]?.toUpperCase()}
    </div>
  );
});

// ── Media ─────────────────────────────────────────────────────────────────────
const MediaContent = memo(({ msg }) => {
  const [playing, setPlaying] = useState(false);
  const audioRef = useRef(null);
  if (msg.type==="image") return <img src={msg.data} alt="صورة" style={{ maxWidth:"100%", maxHeight:220, borderRadius:10, display:"block", cursor:"pointer" }} onClick={()=>window.open(msg.data,"_blank")} />;
  if (msg.type==="video") return <video src={msg.data} controls playsInline style={{ maxWidth:"100%", maxHeight:220, borderRadius:10, display:"block" }} />;
  if (msg.type==="voice") {
    const toggle = () => { if(!audioRef.current)return; if(playing){audioRef.current.pause();setPlaying(false);}else{audioRef.current.play().catch(()=>{});setPlaying(true);} };
    return (
      <div style={{ display:"flex", alignItems:"center", gap:10, minWidth:160 }}>
        <audio ref={audioRef} src={msg.data} onEnded={()=>setPlaying(false)} />
        <button onClick={toggle} style={{ width:36, height:36, borderRadius:"50%", border:"none", cursor:"pointer", background:"rgba(255,255,255,0.2)", color:"#fff", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{playing?"⏸":"▶"}</button>
        <div style={{ flex:1 }}><div style={{ fontSize:12, opacity:.8 }}>رسالة صوتية</div>{msg.duration>0&&<div style={{ fontSize:10, opacity:.5 }}>{msg.duration}ث</div>}</div>
        <span style={{ fontSize:20 }}>🎙</span>
      </div>
    );
  }
  return <span style={{ wordBreak:"break-word" }}>{msg.text}</span>;
});

// ── Bubble ────────────────────────────────────────────────────────────────────
const Bubble = memo(({ msg, me, isGroup, users }) => {
  const mine = msg.sender === me;
  const sender = users[msg.sender] || { username:msg.sender };
  const isMedia = ["image","video","voice"].includes(msg.type);
  return (
    <div style={{ display:"flex", flexDirection:mine?"row-reverse":"row", alignItems:"flex-end", gap:6, marginBottom:6 }}>
      {!mine && <Avatar user={sender} size={26} />}
      <div style={{ maxWidth:"78%" }}>
        {!mine && isGroup && <div style={{ fontSize:10, color:uc(msg.sender), fontWeight:700, marginBottom:2, paddingRight:4 }}>{msg.sender}</div>}
        <div style={{ padding:isMedia?"6px":"9px 13px", borderRadius:mine?"18px 18px 4px 18px":"18px 18px 18px 4px", background:mine?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e1e2e", color:mine?"#fff":"#d4d4e8", fontSize:14, lineHeight:1.5, boxShadow:mine?"0 3px 10px #6366f144":"0 2px 6px #0006" }}>
          <MediaContent msg={msg} />
        </div>
        <div style={{ fontSize:10, color:"#444", marginTop:2, textAlign:mine?"left":"right" }}>{fmt(msg.ts)}</div>
      </div>
    </div>
  );
});

// ── Messages ──────────────────────────────────────────────────────────────────
const MessagesList = memo(({ msgs, me, isGroup, users, emptyNode }) => {
  const bot = useRef(null);
  const prevLen = useRef(0);
  useEffect(() => { if(msgs.length!==prevLen.current){bot.current?.scrollIntoView({behavior:"smooth"});prevLen.current=msgs.length;} }, [msgs.length]);
  return (
    <div style={{ flex:1, overflowY:"auto", padding:"14px 14px 4px" }}>
      {msgs.length===0 && emptyNode}
      {msgs.map(m => <Bubble key={m.id||m.ts} msg={m} me={me} isGroup={isGroup} users={users} />)}
      <div ref={bot} />
    </div>
  );
});

// ── Chat Input ────────────────────────────────────────────────────────────────
const ChatInput = memo(({ placeholder, onSend, onMedia }) => {
  const [val, setVal] = useState("");
  const [mode, setMode] = useState("text");
  const [recording, setRecording] = useState(false);
  const [recSec, setRecSec] = useState(0);
  const [recDone, setRecDone] = useState(null);
  const mrRef = useRef(null); const timerRef = useRef(null); const recRef = useRef(0);
  const imgRef = useRef(null); const vidRef = useRef(null);

  const send = useCallback(() => { if(!val.trim())return; onSend(val.trim()); setVal(""); }, [val,onSend]);
  const handleImg = (e) => { const f=e.target.files[0];if(!f)return; const r=new FileReader(); r.onload=()=>onMedia("image",r.result); r.readAsDataURL(f); e.target.value=""; setMode("text"); };
  const handleVid = (e) => { const f=e.target.files[0];if(!f)return; const r=new FileReader(); r.onload=()=>onMedia("video",r.result); r.readAsDataURL(f); e.target.value=""; setMode("text"); };

  const startRec = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream); const chunks = [];
      mr.ondataavailable = e=>chunks.push(e.data);
      mr.onstop = () => { stream.getTracks().forEach(t=>t.stop()); const blob=new Blob(chunks,{type:"audio/webm"}); const r=new FileReader(); r.onload=()=>setRecDone({data:r.result,duration:recRef.current}); r.readAsDataURL(blob); };
      mr.start(); mrRef.current=mr; setRecording(true); setRecSec(0); recRef.current=0;
      timerRef.current = setInterval(()=>{recRef.current+=1;setRecSec(s=>s+1);},1000);
    } catch { alert("تعذّر الوصول للميكروفون"); }
  };
  const stopRec = () => { if(!mrRef.current||mrRef.current.state==="inactive")return; mrRef.current.stop(); clearInterval(timerRef.current); setRecording(false); };
  const sendVoice = () => { if(!recDone)return; onMedia("voice",recDone.data,recDone.duration); setRecDone(null); setMode("text"); };

  return (
    <div style={{ background:"#12121e", borderTop:"1px solid #1e1e30", flexShrink:0 }}>
      {mode==="media" && (
        <div style={{ padding:"12px 12px 0", display:"flex", gap:8 }}>
          <button onClick={()=>imgRef.current.click()} style={{ flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}><span style={{fontSize:28}}>🖼</span><span>صورة</span></button>
          <button onClick={()=>vidRef.current.click()} style={{ flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}><span style={{fontSize:28}}>🎥</span><span>فيديو</span></button>
          <button onClick={()=>setMode("voice")} style={{ flex:1,padding:"14px 10px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#e0e0f0",cursor:"pointer",fontSize:13,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}><span style={{fontSize:28}}>🎙</span><span>صوتية</span></button>
          <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImg}/>
          <input ref={vidRef} type="file" accept="video/*" style={{display:"none"}} onChange={handleVid}/>
        </div>
      )}
      {mode==="voice" && (
        <div style={{ padding:"16px 14px" }}>
          {!recording&&!recDone&&<div style={{textAlign:"center"}}><p style={{color:"#888",fontSize:13,marginBottom:12}}>اضغط لبدء التسجيل</p><button onClick={startRec} style={{width:70,height:70,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",cursor:"pointer",fontSize:30,color:"#fff",display:"inline-flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px #ef444455"}}>🎙</button></div>}
          {recording&&<div style={{textAlign:"center"}}><div style={{color:"#ff9090",fontSize:14,marginBottom:10}}>🔴 جارٍ التسجيل... {recSec}ث</div><div style={{display:"flex",justifyContent:"center",gap:12}}><button onClick={stopRec} style={{padding:"12px 24px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>⏹ إيقاف</button><button onClick={()=>{stopRec();setTimeout(()=>{setRecDone(null);setRecording(false);setRecSec(0);},300);}} style={{padding:"12px 24px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#ff9090",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>✕ إلغاء</button></div></div>}
          {recDone&&!recording&&<div style={{textAlign:"center"}}><div style={{color:"#4ade80",fontSize:13,marginBottom:10}}>✅ تم التسجيل ({recDone.duration}ث)</div><div style={{display:"flex",justifyContent:"center",gap:10}}><button onClick={sendVoice} style={{padding:"12px 28px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>إرسال ←</button><button onClick={()=>{setRecDone(null);setMode("text");}} style={{padding:"12px 20px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:14,color:"#ff9090",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>إلغاء</button></div></div>}
        </div>
      )}
      <div style={{ padding:"10px 12px", display:"flex", gap:8, alignItems:"center" }}>
        <button onClick={()=>setMode(mode==="text"?"media":"text")} style={{ width:42,height:42,flexShrink:0,background:mode!=="text"?"#6366f133":"#1e1e2e",border:`1px solid ${mode!=="text"?"#6366f1":"#2a2a3e"}`,borderRadius:12,cursor:"pointer",color:mode!=="text"?"#a5b4fc":"#666",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center" }}>{mode!=="text"?"✕":"+"}</button>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder={placeholder} style={{ flex:1,padding:"11px 14px",background:"#1e1e2e",border:"1.5px solid #2a2a3e",borderRadius:12,color:"#e0e0f0",fontSize:14,fontFamily:"inherit",outline:"none",direction:"rtl" }}/>
        <button onClick={send} style={{ width:42,height:42,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:12,cursor:"pointer",color:"#fff",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>←</button>
      </div>
    </div>
  );
});

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [ready, setReady] = useState(window.__firebaseReady||false);
  const [me, setMe] = useState(null);
  const [screen, setScreen] = useState("auth");
  const [activeId, setActiveId] = useState(null);
  const [users, setUsers] = useState({});
  const [groups, setGroups] = useState({});
  const [msgs, setMsgs] = useState([]);
  const [aMode, setAMode] = useState("login");
  const [aUser, setAUser] = useState(""); const [aPass, setAPass] = useState(""); const [aErr, setAErr] = useState("");
  const [ngName, setNgName] = useState("");
  const [jCode, setJCode] = useState(""); const [jErr, setJErr] = useState("");
  const [panel, setPanel] = useState(false);
  const [ndmUser, setNdmUser] = useState(""); const [showNdm, setShowNdm] = useState(false);
  const [copied, setCopied] = useState(false);
  const [editEmoji, setEditEmoji] = useState(""); const [editBio, setEditBio] = useState(""); const [editPhoto, setEditPhoto] = useState(null);
  const [dmChats, setDmChats] = useState({});
  const photoRef = useRef(null);
  const listenersRef = useRef([]);

  useEffect(() => {
    if (window.__firebaseReady) { setReady(true); return; }
    window.addEventListener('firebaseReady', () => setReady(true));
  }, []);

  // Load users & groups
  useEffect(() => {
    if (!ready) return;
    const u1 = dbListen("users", v => setUsers(v||{}));
    const u2 = dbListen("groups", v => setGroups(v||{}));
    listenersRef.current = [u1, u2];
    return () => listenersRef.current.forEach(u=>u());
  }, [ready]);

  const go = useCallback((s, id=null) => { setScreen(s); setActiveId(id); setPanel(false); setJErr(""); setJCode(""); setMsgs([]); }, []);
  const meData = me ? users[me] : null;

  // Listen to messages
  useEffect(() => {
    if (!me || !activeId) return;
    let path = "";
    if (screen==="group") path = `groupMsgs/${activeId}`;
    else if (screen==="dm") path = `dmMsgs/${[me,activeId].sort().join("_")}`;
    else return;
    const unsub = dbListen(path, v => {
      if (!v) { setMsgs([]); return; }
      const arr = Object.entries(v).map(([id,m])=>({...m,id})).sort((a,b)=>a.ts-b.ts);
      setMsgs(arr);
    });
    return unsub;
  }, [me, activeId, screen]);

  // Listen to all DMs for home screen preview
  useEffect(() => {
    if (!me) return;
    const unsub = dbListen(`dmMsgs`, v => setDmChats(v||{}));
    return unsub;
  }, [me]);

  // ── Auth ──────────────────────────────────────────────────────────────────
  const auth = async () => {
    setAErr(""); const u=aUser.trim(), p=aPass.trim();
    if(!u||!p) return setAErr("أدخل الاسم وكلمة المرور");
    if(aMode==="login"){
      const userData = await dbGet(`users/${u}`);
      if(!userData) return setAErr("المستخدم غير موجود");
      if(userData.password!==p) return setAErr("كلمة المرور خاطئة");
      setMe(u); setScreen("home");
    } else {
      const exists = await dbGet(`users/${u}`);
      if(exists) return setAErr("الاسم محجوز");
      if(u.length<2) return setAErr("الاسم قصير");
      await dbSet(`users/${u}`, {username:u,password:p,emoji:"",bio:"",photo:null});
      setMe(u); setScreen("home");
    }
  };

  // ── Send messages ─────────────────────────────────────────────────────────
  const sendG = useCallback(async (text) => {
    await dbPush(`groupMsgs/${activeId}`, {sender:me,type:"text",text,ts:Date.now()});
  }, [activeId, me]);

  const sendD = useCallback(async (text) => {
    const cid=[me,activeId].sort().join("_");
    await dbPush(`dmMsgs/${cid}`, {sender:me,type:"text",text,ts:Date.now()});
  }, [activeId, me]);

  const mediaG = useCallback(async (type, data, duration=0) => {
    await dbPush(`groupMsgs/${activeId}`, {sender:me,type,data,duration,ts:Date.now()});
  }, [activeId, me]);

  const mediaD = useCallback(async (type, data, duration=0) => {
    const cid=[me,activeId].sort().join("_");
    await dbPush(`dmMsgs/${cid}`, {sender:me,type,data,duration,ts:Date.now()});
  }, [activeId, me]);

  // ── Groups ────────────────────────────────────────────────────────────────
  const mkGroup = async () => {
    if(!ngName.trim()) return;
    const gid=uid(), inv=uid();
    await dbSet(`groups/${gid}`, {id:gid,name:ngName.trim(),admin:me,members:{[me]:true},pending:{},inviteCode:inv,inviteActive:true});
    setNgName(""); go("group",gid);
  };

  const joinInv = async () => {
    setJErr(""); const code=jCode.trim();
    const allGroups = await dbGet("groups");
    if(!allGroups) return setJErr("لا توجد مجموعات");
    const g = Object.values(allGroups).find(g=>g.inviteCode===code&&g.inviteActive);
    if(!g) return setJErr("رمز الدعوة غير صالح");
    if(g.members&&g.members[me]){go("group",g.id);return;}
    await dbUpdate(`groups/${g.id}/members`, {[me]:true});
    if(g.pending&&g.pending[me]) await dbRemove(`groups/${g.id}/pending/${me}`);
    go("group",g.id); setJCode("");
  };

  const reqJoin = async () => {
    setJErr(""); const gid=jCode.trim();
    const g = await dbGet(`groups/${gid}`);
    if(!g) return setJErr("المعرّف غير موجود");
    if(g.members&&g.members[me]) return setJErr("أنت بالفعل عضو");
    if(g.pending&&g.pending[me]) return setJErr("طلبك قيد الانتظار");
    await dbUpdate(`groups/${gid}/pending`, {[me]:true});
    setJErr("✅ تم إرسال الطلب!");
  };

  const approve = async (gid,u) => {
    await dbUpdate(`groups/${gid}/members`,{[u]:true});
    await dbRemove(`groups/${gid}/pending/${u}`);
  };
  const reject = async (gid,u) => { await dbRemove(`groups/${gid}/pending/${u}`); };
  const kick   = async (gid,u) => { await dbRemove(`groups/${gid}/members/${u}`); };
  const togInv = async (gid,cur) => { await dbUpdate(`groups/${gid}`,{inviteActive:!cur}); };

  // ── Profile ───────────────────────────────────────────────────────────────
  const openProfile = () => { setEditEmoji(meData?.emoji||""); setEditBio(meData?.bio||""); setEditPhoto(meData?.photo||null); go("profile"); };
  const saveProfile = async () => {
    await dbUpdate(`users/${me}`,{emoji:editEmoji,bio:editBio.trim(),photo:editPhoto||null});
    go("home");
  };
  const handlePhotoChange = (e) => { const f=e.target.files[0];if(!f)return; const r=new FileReader(); r.onload=()=>setEditPhoto(r.result); r.readAsDataURL(f); };

  // ── Computed ──────────────────────────────────────────────────────────────
  const myGrps = Object.values(groups).filter(g=>g.members&&g.members[me]);
  const others = Object.keys(users).filter(u=>u!==me);
  const ag = screen==="group" ? groups[activeId] : null;
  const agMembers = ag?.members ? Object.keys(ag.members) : [];
  const agPending = ag?.pending ? Object.keys(ag.pending) : [];

  const getDmKey = (u) => [me,u].sort().join("_");
  const getDmMsgs = (u) => { const k=getDmKey(u); return dmChats[k] ? Object.values(dmChats[k]).sort((a,b)=>a.ts-b.ts) : []; };
  const hasDm = (u) => getDmMsgs(u).length > 0;

  const lp = (m) => { if(!m)return null; if(m.type==="text")return m.text; if(m.type==="image")return"🖼 صورة"; if(m.type==="video")return"🎥 فيديو"; return"🎙 صوتية"; };

  const B = (bg,col="#fff",ex={}) => ({padding:"11px 18px",background:bg,border:"none",borderRadius:12,color:col,fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"inherit",...ex});
  const I = {width:"100%",padding:"12px 14px",background:"#1e1e2e",border:"1.5px solid #2a2a3e",borderRadius:12,color:"#e0e0f0",fontSize:14,fontFamily:"inherit",outline:"none",direction:"rtl",boxSizing:"border-box"};
  const C = {display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:14,cursor:"pointer",background:"#12121e",border:"1px solid #1e1e30",marginBottom:6};

  if (!ready) return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a14",flexDirection:"column",gap:12}}>
      <div style={{fontSize:40}}>💬</div>
      <div style={{color:"#6366f1",fontSize:16,fontWeight:700}}>جاري الاتصال...</div>
    </div>
  );

  // ── AUTH ──────────────────────────────────────────────────────────────────
  if (screen==="auth") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0a0a14,#0d0d1a)",padding:20,direction:"rtl"}}>
      <div style={{width:"100%",maxWidth:360,background:"#12121e",border:"1px solid #1e1e30",borderRadius:22,padding:"36px 24px",boxShadow:"0 24px 60px #000a"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:8}}>💬</div>
          <h1 style={{color:"#fff",fontSize:24,fontWeight:800}}>نبضة Chat</h1>
          <p style={{color:"#4ade80",fontSize:12,marginTop:6}}>🔴 مباشر — رسائل حقيقية بين الأجهزة</p>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:20,background:"#0a0a14",borderRadius:12,padding:4}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setAMode(m);setAErr("");}} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,background:aMode===m?"linear-gradient(135deg,#6366f1,#8b5cf6)":"transparent",color:aMode===m?"#fff":"#555"}}>
              {m==="login"?"دخول":"حساب جديد"}
            </button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input value={aUser} onChange={e=>setAUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&auth()} placeholder="اسم المستخدم" style={I}/>
          <input type="password" value={aPass} onChange={e=>setAPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&auth()} placeholder="كلمة المرور" style={I}/>
        </div>
        {aErr&&<div style={{marginTop:12,padding:"9px 12px",background:"#ff6b6b18",borderRadius:9,color:"#ff9090",fontSize:13,textAlign:"center"}}>{aErr}</div>}
        <button onClick={auth} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),width:"100%",marginTop:14,fontSize:15}}>
          {aMode==="login"?"دخول ←":"إنشاء الحساب ←"}
        </button>
      </div>
    </div>
  );

  // ── MAIN LAYOUT ───────────────────────────────────────────────────────────
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#0a0a14",color:"#e0e0f0",direction:"rtl",overflow:"hidden"}}>
      {/* TOP BAR */}
      <div style={{padding:"10px 14px",background:"#12121e",borderBottom:"1px solid #1e1e30",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {["dm","group","newGroup","join","profile","userProfile"].includes(screen)&&(
          <button onClick={()=>go("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:22,padding:2,lineHeight:1}}>←</button>
        )}
        {screen==="home"&&<button onClick={openProfile} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Avatar user={meData} size={34}/></button>}
        {screen==="dm"&&activeId&&<button onClick={()=>go("userProfile",activeId)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Avatar user={users[activeId]} size={32}/></button>}
        {screen==="group"&&ag&&<div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${uc(ag.name)},${uc(ag.name+"1")})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff",flexShrink:0}}>{ag.name[0]}</div>}
        {screen==="userProfile"&&activeId&&<Avatar user={users[activeId]} size={32}/>}
        <div style={{flex:1,minWidth:0}}>
          {screen==="home"&&<><span style={{fontWeight:800,fontSize:16,color:"#a5b4fc"}}>نبضة 💬</span><span style={{fontSize:11,color:"#4ade80",marginRight:8}}>● {me}</span></>}
          {screen==="dm"&&activeId&&<button onClick={()=>go("userProfile",activeId)} style={{background:"none",border:"none",cursor:"pointer",textAlign:"right",padding:0}}><div style={{fontWeight:700,fontSize:15,color:"#e0e0f0"}}>{activeId}</div>{users[activeId]?.bio&&<div style={{fontSize:11,color:"#555"}}>{users[activeId].bio}</div>}</button>}
          {screen==="group"&&ag&&<div><div style={{fontWeight:700,fontSize:15}}>{ag.name}</div><div style={{fontSize:11,color:"#555"}}>{agMembers.length} عضو</div></div>}
          {screen==="newGroup"&&<span style={{fontWeight:700}}>مجموعة جديدة</span>}
          {screen==="join"&&<span style={{fontWeight:700}}>الانضمام لمجموعة</span>}
          {screen==="profile"&&<span style={{fontWeight:700}}>ملفي الشخصي</span>}
          {screen==="userProfile"&&activeId&&<span style={{fontWeight:700}}>{activeId}</span>}
        </div>
        {screen==="group"&&ag&&<button onClick={()=>setPanel(!panel)} style={{...B(panel?"#6366f133":"#1e1e2e","#a5b4fc",{padding:"7px 12px",fontSize:12,border:"1px solid #2a2a3e"})}}>{ag.admin===me?"👑":"👥"}</button>}
      </div>

      {/* HOME */}
      {screen==="home"&&(
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            <button onClick={()=>{setScreen("newGroup");setNgName("");}} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),flex:1,fontSize:13}}>+ مجموعة</button>
            <button onClick={()=>go("join")} style={{...B("#1e1e2e","#a5b4fc",{flex:1,fontSize:13,border:"1px solid #2a2a3e"})}}>🔗 انضمام</button>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:700,color:"#444",letterSpacing:"1.5px"}}>المحادثات الخاصة</span>
              <button onClick={()=>setShowNdm(!showNdm)} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:22,lineHeight:1,padding:0}}>+</button>
            </div>
            {showNdm&&(<div style={{display:"flex",gap:6,marginBottom:10}}>
              <input value={ndmUser} onChange={e=>setNdmUser(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){const t=ndmUser.trim();if(t&&users[t]&&t!==me){go("dm",t);setShowNdm(false);setNdmUser("");}}}} placeholder="اسم المستخدم..." style={{...I,flex:1,padding:"9px 12px",fontSize:13}}/>
              <button onClick={()=>{const t=ndmUser.trim();if(t&&users[t]&&t!==me){go("dm",t);setShowNdm(false);setNdmUser("");}}} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)","#fff",{padding:"9px 14px"})}}>→</button>
            </div>)}
            {others.filter(u=>hasDm(u)).map(u=>{
              const ms=getDmMsgs(u); const last=ms[ms.length-1];
              return(<div key={u} style={C} onClick={()=>go("dm",u)}><Avatar user={users[u]} size={42}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14}}>{u}</div>{last&&<div style={{fontSize:12,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last.sender===me?"أنت: ":""}{lp(last)}</div>}</div></div>);
            })}
            {others.filter(u=>hasDm(u)).length===0&&<div style={{color:"#333",fontSize:12,padding:"4px"}}>اضغط + لبدء محادثة جديدة</div>}
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#444",letterSpacing:"1.5px",marginBottom:8}}>المجموعات</div>
            {myGrps.length===0&&<div style={{color:"#333",fontSize:12,padding:"4px"}}>لا توجد مجموعات بعد</div>}
            {myGrps.map(g=>{
              const pc=g.admin===me&&g.pending?Object.keys(g.pending).length:0;
              return(<div key={g.id} style={C} onClick={()=>go("group",g.id)}><div style={{width:42,height:42,borderRadius:12,flexShrink:0,background:`linear-gradient(135deg,${uc(g.name)},${uc(g.name+"1")})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:"#fff"}}>{g.name[0]}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:700,fontSize:14}}>{g.name}</span>{pc>0&&<span style={{background:"#ff6b6b22",color:"#ff9090",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:6}}>{pc} طلب</span>}</div><div style={{fontSize:11,color:"#333"}}>{g.members?Object.keys(g.members).length:0} عضو</div></div></div>);
            })}
          </div>
        </div>
      )}

      {/* PROFILE */}
      {screen==="profile"&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          <div style={{maxWidth:380,margin:"0 auto"}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <Avatar user={{...meData,photo:editPhoto,emoji:editEmoji}} size={90}/>
                <button onClick={()=>photoRef.current.click()} style={{position:"absolute",bottom:0,left:0,width:30,height:30,borderRadius:"50%",background:"#6366f1",border:"2px solid #0a0a14",cursor:"pointer",color:"#fff",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
              </div>
              <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoChange}/>
              <div style={{fontWeight:800,fontSize:20,marginTop:10,color:"#fff"}}>{me}</div>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,color:"#888",fontWeight:700,display:"block",marginBottom:8}}>رمز تعبيري</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {["","😀","😎","🥷","👻","🐱","🦊","🐼","🤖","👽","🦁","🌟","🔥","💎","🎮","🚀","⚡","🎸","🧠","💫"].map(e=>(
                  <button key={e} onClick={()=>setEditEmoji(e)} style={{width:36,height:36,fontSize:19,borderRadius:10,border:`2px solid ${editEmoji===e?"#6366f1":"#2a2a3e"}`,background:editEmoji===e?"#6366f122":"#1e1e2e",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{e||<span style={{fontSize:11,color:"#555"}}>لا</span>}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,color:"#888",fontWeight:700,display:"block",marginBottom:8}}>النبذة الشخصية</label>
              <textarea value={editBio} onChange={e=>setEditBio(e.target.value)} placeholder="اكتب شيئاً عن نفسك..." rows={3} style={{...I,resize:"none",lineHeight:1.6}}/>
            </div>
            <button onClick={saveProfile} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),width:"100%",fontSize:15,marginBottom:10}}>حفظ ✓</button>
            <button onClick={()=>{setMe(null);setScreen("auth");setAUser("");setAPass("");}} style={{...B("#1e1e2e","#ff9090",{width:"100%",border:"1px solid #ff6b6b33"})}}>⏻ تسجيل الخروج</button>
          </div>
        </div>
      )}

      {/* USER PROFILE */}
      {screen==="userProfile"&&activeId&&users[activeId]&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          <div style={{maxWidth:380,margin:"0 auto",textAlign:"center"}}>
            <Avatar user={users[activeId]} size={90}/>
            <div style={{fontWeight:800,fontSize:22,marginTop:12,color:"#fff"}}>{activeId}</div>
            <div style={{marginTop:8,color:users[activeId]?.bio?"#888":"#333",fontSize:14,padding:"0 20px",lineHeight:1.6}}>{users[activeId]?.bio||"لا توجد نبذة شخصية"}</div>
            {users[activeId]?.emoji&&<div style={{fontSize:30,marginTop:8}}>{users[activeId].emoji}</div>}
            <button onClick={()=>go("dm",activeId)} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),width:"100%",fontSize:15,marginTop:20}}>💬 إرسال رسالة</button>
          </div>
        </div>
      )}

      {/* NEW GROUP */}
      {screen==="newGroup"&&(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>👥</div>
            <h2 style={{fontWeight:800,fontSize:20,marginBottom:20}}>مجموعة جديدة</h2>
            <input value={ngName} onChange={e=>setNgName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&mkGroup()} placeholder="اسم المجموعة..." style={{...I,marginBottom:14}}/>
            <button onClick={mkGroup} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),width:"100%",fontSize:15}}>إنشاء ←</button>
          </div>
        </div>
      )}

      {/* JOIN */}
      {screen==="join"&&(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔗</div>
            <h2 style={{fontWeight:800,fontSize:20,marginBottom:20}}>الانضمام لمجموعة</h2>
            <input value={jCode} onChange={e=>setJCode(e.target.value)} placeholder="رمز الدعوة أو المعرّف..." style={{...I,marginBottom:12}}/>
            {jErr&&<div style={{marginBottom:12,padding:"9px 12px",background:jErr.startsWith("✅")?"#4ade8018":"#ff6b6b18",borderRadius:9,color:jErr.startsWith("✅")?"#4ade80":"#ff9090",fontSize:13}}>{jErr}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={joinInv} style={{...B("linear-gradient(135deg,#6366f1,#8b5cf6)"),flex:1,fontSize:13}}>انضمام برمز الدعوة</button>
              <button onClick={reqJoin} style={{...B("#1e1e2e","#a5b4fc",{flex:1,fontSize:13,border:"1px solid #2a2a3e"})}}>إرسال طلب</button>
            </div>
          </div>
        </div>
      )}

      {/* DM */}
      {screen==="dm"&&activeId&&(
        <>
          <MessagesList msgs={msgs} me={me} isGroup={false} users={users} emptyNode={<div style={{textAlign:"center",marginTop:60,color:"#333"}}><div style={{fontSize:40}}>👋</div><div style={{fontSize:14,marginTop:8}}>ابدأ المحادثة مع {activeId}</div></div>}/>
          <ChatInput placeholder={`رسالة إلى ${activeId}...`} onSend={sendD} onMedia={mediaD}/>
        </>
      )}

      {/* GROUP */}
      {screen==="group"&&ag&&(
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <MessagesList msgs={msgs} me={me} isGroup={true} users={users} emptyNode={
              <div style={{textAlign:"center",marginTop:50,color:"#333"}}>
                <div style={{fontSize:40}}>💬</div>
                <div style={{fontSize:14,marginTop:8}}>لا توجد رسائل بعد</div>
                {ag.admin===me&&<div style={{marginTop:14,padding:"14px",background:"#1e1e2e",borderRadius:14,display:"inline-block"}}><div style={{color:"#a5b4fc",fontSize:12,fontWeight:700,marginBottom:4}}>🔗 رمز الدعوة</div><div style={{fontFamily:"monospace",color:"#4ade80",fontSize:15,letterSpacing:"2px",fontWeight:700}}>{ag.inviteCode}</div></div>}
              </div>}/>
            <ChatInput placeholder={`رسالة في ${ag.name}...`} onSend={sendG} onMedia={mediaG}/>
          </div>
          {panel&&(
            <div style={{width:210,background:"#0e0e18",borderRight:"1px solid #1e1e30",overflowY:"auto",flexShrink:0}}>
              <div style={{padding:"12px 14px",fontWeight:700,fontSize:11,color:"#555",borderBottom:"1px solid #1e1e30"}}>{ag.admin===me?"🛡️ الإدارة":"👥 الأعضاء"}</div>
              {ag.admin===me&&(
                <div style={{padding:"10px 14px",borderBottom:"1px solid #1a1a2e"}}>
                  <div style={{fontSize:10,color:"#444",fontWeight:700,letterSpacing:"1px",marginBottom:6}}>رمز الدعوة</div>
                  <div style={{fontFamily:"monospace",fontSize:11,padding:"7px 10px",background:"#1a1a2e",borderRadius:8,color:ag.inviteActive?"#4ade80":"#555",wordBreak:"break-all",marginBottom:6}}>{ag.inviteActive?ag.inviteCode:"🔒 مغلق"}</div>
                  <div style={{fontSize:10,color:"#444",marginBottom:8}}>المعرّف: <span style={{color:"#6366f1",fontFamily:"monospace"}}>{ag.id}</span></div>
                  <div style={{display:"flex",gap:6}}>
                    {ag.inviteActive&&<button onClick={()=>{try{navigator.clipboard.writeText(ag.inviteCode);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{flex:1,padding:"6px",background:copied?"#4ade8022":"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:8,color:copied?"#4ade80":"#888",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{copied?"✓ تم":"نسخ"}</button>}
                    <button onClick={()=>togInv(ag.id,ag.inviteActive)} style={{flex:1,padding:"6px",background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:8,color:ag.inviteActive?"#ff9090":"#4ade80",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{ag.inviteActive?"إغلاق":"فتح"}</button>
                  </div>
                </div>
              )}
              {ag.admin===me&&agPending.length>0&&(
                <div style={{padding:"10px 14px",borderBottom:"1px solid #1a1a2e"}}>
                  <div style={{fontSize:10,color:"#ff9090",fontWeight:700,letterSpacing:"1px",marginBottom:8}}>طلبات ({agPending.length})</div>
                  {agPending.map(u=>(<div key={u} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><Avatar user={users[u]} size={24}/><span style={{flex:1,fontSize:12}}>{u}</span><button onClick={()=>approve(ag.id,u)} style={{background:"#4ade8022",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#4ade80",fontSize:13}}>✓</button><button onClick={()=>reject(ag.id,u)} style={{background:"#ff6b6b22",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:"#ff9090",fontSize:13}}>✗</button></div>))}
                </div>
              )}
              <div style={{padding:"10px 14px"}}>
                <div style={{fontSize:10,color:"#444",fontWeight:700,letterSpacing:"1px",marginBottom:8}}>الأعضاء ({agMembers.length})</div>
                {agMembers.map(u=>(<div key={u} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Avatar user={users[u]} size={28}/></button>
                  <div style={{flex:1,minWidth:0}}>
                    <button onClick={()=>go("userProfile",u)} style={{background:"none",border:"none",cursor:"pointer",padding:0,textAlign:"right"}}><div style={{fontSize:12,fontWeight:u===ag.admin?700:400,color:"#e0e0f0"}}>{u}</div></button>
                    {u===ag.admin&&<div style={{fontSize:10,color:"#FFD93D"}}>👑 مشرف</div>}
                  </div>
                  {ag.admin===me&&u!==me&&<button onClick={()=>kick(ag.id,u)} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:15}}>🗑</button>}
                </div>))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Root() {
  const [ready, setReady] = useState(window.__firebaseReady||false);
  useEffect(() => { if(!window.__firebaseReady) window.addEventListener('firebaseReady',()=>setReady(true)); else setReady(true); },[]);
  if (!ready) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a14",color:"#6366f1",fontSize:20}}>💬 جاري الاتصال...</div>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
