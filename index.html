<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Segoe UI','Cairo',Tahoma,sans-serif;-webkit-tap-highlight-color:transparent}
input,textarea,button{font-family:inherit}
input:focus,textarea:focus{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#6366f144;border-radius:3px}
.tab{flex:1;padding:10px 4px;border:none;background:transparent;font-size:12px;font-family:inherit;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:600;transition:color .15s,border-color .15s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slideup{animation:slideUp .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.ptr-spinner{display:flex;align-items:center;justify-content:center;padding:10px;color:#6366f1;font-size:13px;gap:6px}
@keyframes storyProgress{from{width:0}to{width:100%}}
.story-bar{height:3px;background:#6366f144;border-radius:2px;overflow:hidden}
.story-bar-fill{height:100%;background:#fff;border-radius:2px}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.toast{animation:toastIn .25s ease}
.toast.out{animation:toastOut .25s ease forwards}
@keyframes cooldown{from{width:100%}to{width:0%}}
.msg-item{transition:transform .15s}
</style>
</head>
<body>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#f0f4ff,#e8eeff);flex-direction:column;gap:14px">
  <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(99,102,241,.35)">💬</div>
  <div style="font-size:22px;font-weight:800;color:#6366f1;letter-spacing:-0.5px">نبضة</div>
  <div style="display:flex;gap:6px;margin-top:4px"><div style="width:8px;height:8px;border-radius:50%;background:#6366f1;opacity:0.3"></div><div style="width:8px;height:8px;border-radius:50%;background:#6366f1;opacity:0.65"></div><div style="width:8px;height:8px;border-radius:50%;background:#6366f1;opacity:1"></div></div>
</div></div>

<script type="module">

const cfg={apiKey:"AIzaSyBqRplVWgiZUXkbujiQ-KWNca6dPwC-kOk",authDomain:"nabda-chat.firebaseapp.com",databaseURL:"https://nabda-chat-default-rtdb.firebaseio.com",projectId:"nabda-chat",storageBucket:"nabda-chat.firebasestorage.app",messagingSenderId:"399164736455",appId:"1:399164736455:web:127df9589215b9e8120fe2"};

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const{useState,useRef,useEffect,useCallback,memo,useMemo}=React;

const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=ts=>new Date(ts).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
const fmtFull=ts=>{const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return"الآن";if(diff<3600000)return`منذ ${Math.floor(diff/60000)} د`;if(diff<86400000)return fmt(ts);return d.toLocaleDateString("ar");};
const COLS=["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ef4444","#06b6d4"];
const uc=n=>n?COLS[n.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLS.length]:"#6366f1";
const ls=(k,fb)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const D=()=>window.__db;
const AUTH=()=>window.__auth;
const F=()=>window.__fn;
const dSet=(p,v)=>F().set(F().ref(D(),p),v);
const dUpd=(p,v)=>F().update(F().ref(D(),p),v);
const dPush=(p,v)=>F().push(F().ref(D(),p),v);
const dGet=async p=>{try{const s=await F().get(F().ref(D(),p));return s.exists()?s.val():null;}catch{return null;}};
const dListen=(p,cb)=>{const r=F().ref(D(),p);F().onValue(r,s=>cb(s.val()));return()=>F().off(r);};
const dDel=p=>F().remove(F().ref(D(),p));

const useTheme=()=>{
  const[dark,setDark]=useState(()=>{const s=ls("nabda_theme",null);return s!=null?s:window.matchMedia?.("(prefers-color-scheme:dark)").matches;});
  const toggle=()=>{const nd=!dark;setDark(nd);lsSet("nabda_theme",nd);};
  return{dark,toggle};
};
const T=dark=>({
  bg:dark?"#0a0a14":"#f0f2f5",card:dark?"#12121e":"#ffffff",card2:dark?"#1a1a2a":"#f8f9fa",
  border:dark?"#1e1e30":"#e5e7eb",text:dark?"#e0e0f0":"#1f2937",text2:dark?"#888":"#6b7280",
  text3:dark?"#555":"#9ca3af",inp:dark?"#1a1a2a":"#f3f4f6",inpBorder:dark?"#2a2a3e":"#d1d5db",
  bubble:dark?"#1e1e2e":"#e5e7eb",topbar:dark?"#12121e":"#ffffff",tabs:dark?"#12121e":"#ffffff",
});

let _ac=null;
const getAC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
const snd=t=>{try{const c=getAC();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
  if(t==="send"){o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(660,c.currentTime+0.08);g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);o.start();o.stop(c.currentTime+0.08);}
  else if(t==="recv"){o.type="sine";o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+0.1);g.gain.setValueAtTime(0.22,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.start();o.stop(c.currentTime+0.25);}
  else if(t==="notif"){o.frequency.setValueAtTime(784,c.currentTime);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start();o.stop(c.currentTime+0.3);}
}catch{}};

const requestNotifPerm=async()=>{if("Notification"in window&&Notification.permission==="default")await Notification.requestPermission();};
const showNotif=(title,body,onClick)=>{
  if("Notification"in window&&Notification.permission==="granted"&&document.visibilityState==="hidden"){
    const n=new Notification(title,{body,icon:"icon.png",badge:"icon.png",tag:title});
    if(onClick)n.onclick=()=>{window.focus();n.close();onClick();};
  }
};

let _toastCb=null;
const toast=(msg,type="info",dur=2800)=>{if(_toastCb)_toastCb({msg,type,dur});};

const ToastHost=()=>{
  const[items,setItems]=useState([]);
  useEffect(()=>{_toastCb=({msg,type,dur})=>{const id=uid();setItems(p=>[...p,{id,msg,type}]);setTimeout(()=>setItems(p=>p.filter(x=>x.id!==id)),dur);};return()=>{_toastCb=null;};},[]);
  if(!items.length)return null;
  const colors={info:"#6366f1",success:"#22c55e",error:"#ef4444",warn:"#f59e0b"};
  return<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none"}}>
    {items.map(it=><div key={it.id} className="toast" style={{background:colors[it.type]||colors.info,color:"#fff",padding:"9px 18px",borderRadius:22,fontSize:13,fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,.22)",whiteSpace:"nowrap",maxWidth:"90vw",overflow:"hidden",textOverflow:"ellipsis"}}>{it.msg}</div>)}
  </div>;
};

const Av=memo(({user,size=36,onClick,ring=false,seen=false,online=false})=>{
  const name=user?.username||"?";const c=uc(name);
  const inner=user?.photo
    ?<img src={user.photo} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block"}} loading="lazy"/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${c}dd,${c}77)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:user?.emoji?size*.5:size*.4,fontWeight:800,color:"#fff",userSelect:"none",flexShrink:0}}>{user?.emoji||name[0]?.toUpperCase()||"?"}</div>;
  return(
    <div onClick={onClick} style={{cursor:onClick?"pointer":"default",flexShrink:0,position:"relative",display:"inline-flex"}}>
      {ring?<div style={{padding:2,borderRadius:"50%",border:`2.5px solid ${seen?"#aaa":"#6366f1"}`,display:"inline-flex"}}>{inner}</div>:inner}
      {online&&<div style={{position:"absolute",bottom:1,left:1,width:Math.max(8,size*.22),height:Math.max(8,size*.22),background:"#22c55e",borderRadius:"50%",border:"2px solid white",flexShrink:0}}/>}
    </div>
  );
});

const ImgView=({src,onClose})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <img src={src} style={{maxWidth:"96vw",maxHeight:"88vh",objectFit:"contain",borderRadius:10}} onClick={e=>e.stopPropagation()}/>
    <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>✕</button>
  </div>
);

const StoryViewer=({stories,initialUser,users,me,onClose,onDelete,isOnline,fmtFull})=>{
  const userList=Object.keys(stories).filter(u=>stories[u]&&Object.keys(stories[u]).length>0);
  const initIdx=Math.max(0,userList.indexOf(initialUser));
  const[uIdx,setUIdx]=useState(initIdx);
  const[sIdx,setSIdx]=useState(0);
  const[progress,setProgress]=useState(0);
  const timerRef=useRef(null);
  const dur=5000;

  const curUser=userList[uIdx];
  const curStories=curUser?Object.entries(stories[curUser]||{}).sort((a,b)=>b[1].ts-a[1].ts):[];
  const curStory=curStories[sIdx];

  const next=useCallback(()=>{
    if(sIdx<curStories.length-1){setSIdx(s=>s+1);setProgress(0);}
    else if(uIdx<userList.length-1){setUIdx(u=>u+1);setSIdx(0);setProgress(0);}
    else onClose();
  },[sIdx,curStories.length,uIdx,userList.length,onClose]);

  const prev=()=>{
    if(sIdx>0){setSIdx(s=>s-1);setProgress(0);}
    else if(uIdx>0){setUIdx(u=>u-1);setSIdx(0);setProgress(0);}
  };

  useEffect(()=>{
    setProgress(0);
    clearInterval(timerRef.current);
    const step=100/(dur/50);
    timerRef.current=setInterval(()=>{
      setProgress(p=>{if(p>=100){clearInterval(timerRef.current);next();return 0;}return p+step;});
    },50);
    return()=>clearInterval(timerRef.current);
  },[uIdx,sIdx]);

  if(!curStory)return null;
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:999,display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",gap:3,padding:"10px 12px 6px",position:"absolute",top:0,left:0,right:0,zIndex:2}}>
        {curStories.map(([sid],i)=>(
          <div key={sid} className="story-bar" style={{flex:1}}>
            <div className="story-bar-fill" style={{width:i<sIdx?"100%":i===sIdx?`${progress}%`:"0%",transition:i===sIdx?"none":"none"}}/>
          </div>
        ))}
      </div>
      <div style={{position:"absolute",top:22,left:0,right:0,zIndex:2,padding:"0 12px",display:"flex",alignItems:"center",gap:8}}>
        <Av user={users[curUser]} size={36} online={isOnline(curUser)}/>
        <div style={{flex:1}}><div style={{color:"#fff",fontWeight:700,fontSize:14}}>{curUser}</div><div style={{color:"#aaa",fontSize:11}}>{fmtFull(curStory[1].ts)}</div></div>
        {curUser===me&&<button onClick={()=>onDelete(curStory[0])} style={{background:"rgba(239,68,68,.25)",border:"none",color:"#ef4444",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🗑 حذف</button>}
        <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>
      <img src={curStory[1].data} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
      <div style={{position:"absolute",inset:0,display:"flex"}}><div style={{flex:1}} onClick={prev}/><div style={{flex:1}} onClick={next}/></div>
    </div>
  );
};

const MsgContent=memo(({msg,onImg,th})=>{
  const[play,setPlay]=useState(false);const ar=useRef(null);
  if(msg.type==="image")return<img src={msg.data} style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block",cursor:"pointer"}} onClick={()=>onImg?.(msg.data)} loading="lazy"/>;
  if(msg.type==="video")return<video src={msg.data} controls playsInline style={{maxWidth:"100%",maxHeight:220,borderRadius:10,display:"block"}}/>;
  if(msg.type==="voice"){
    const tog=()=>{if(!ar.current)return;if(play){ar.current.pause();setPlay(false);}else{ar.current.play().catch(()=>{});setPlay(true);}};
    return<div style={{display:"flex",alignItems:"center",gap:10,minWidth:160}}>
      <audio ref={ar} src={msg.data} onEnded={()=>setPlay(false)}/>
      <button onClick={tog} style={{width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:"rgba(255,255,255,.2)",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{play?"⏸":"▶"}</button>
      <div style={{flex:1}}><div style={{fontSize:12,opacity:.8}}>رسالة صوتية</div>{msg.duration>0&&<div style={{fontSize:10,opacity:.5}}>{msg.duration}ث</div>}</div>
      <span style={{fontSize:20}}>🎙</span>
    </div>;
  }
  return<span style={{wordBreak:"break-word",lineHeight:1.55,whiteSpace:"pre-wrap"}}>{msg.text}</span>;
});

const Bubble=memo(({msg,me,isGroup,users,onImg,onAv,bubbleColor,th})=>{
  const mine=msg.sender===me;const sender=users[msg.sender]||{username:msg.sender};
  const isMedia=["image","video","voice"].includes(msg.type);
  const myBubble=bubbleColor||"linear-gradient(135deg,#6366f1,#8b5cf6)";
  return(
    <div className="fadein msg-item" style={{display:"flex",flexDirection:mine?"row-reverse":"row",alignItems:"flex-end",gap:6,marginBottom:3,padding:"0 2px"}}>
      {!mine&&<Av user={sender} size={28} onClick={()=>onAv?.(msg.sender)}/>}
      <div style={{maxWidth:"78%"}}>
        {!mine&&isGroup&&<div style={{fontSize:10,color:uc(msg.sender),fontWeight:700,marginBottom:2,paddingRight:4}}>{msg.sender}</div>}
        <div style={{padding:isMedia?"5px":"9px 13px",borderRadius:mine?"18px 18px 4px 18px":"18px 18px 18px 4px",background:mine?myBubble:th.bubble,color:mine?"#fff":th.text,fontSize:14,lineHeight:1.5,boxShadow:mine?"0 2px 8px rgba(99,102,241,.25)":"0 1px 4px rgba(0,0,0,.08)"}}>
          <MsgContent msg={msg} onImg={onImg} th={th}/>
        </div>
        <div style={{fontSize:10,color:th.text3,marginTop:2,textAlign:mine?"left":"right",paddingRight:2}}>{fmt(msg.ts)}{mine&&<span style={{marginRight:3,opacity:.7}}>✓✓</span>}</div>
      </div>
    </div>
  );
});

const MsgList=memo(({msgs,me,isGroup,users,empty,onImg,onAv,typingUsers,chatBg,bubbleColor,th,onRefresh})=>{
  const bot=useRef(null);const pLen=useRef(0);
  const scrollRef=useRef(null);
  const[refreshing,setRefreshing]=useState(false);
  const touchStartY=useRef(0);

  useEffect(()=>{
    if(msgs.length!==pLen.current){bot.current?.scrollIntoView({behavior:msgs.length-pLen.current>3?"auto":"smooth"});pLen.current=msgs.length;}
  },[msgs.length]);

  const onTouchStart=e=>{if(scrollRef.current?.scrollTop===0)touchStartY.current=e.touches[0].clientY;};
  const onTouchEnd=async e=>{
    const dy=e.changedTouches[0].clientY-touchStartY.current;
    if(dy>60&&scrollRef.current?.scrollTop===0&&onRefresh&&!refreshing){
      setRefreshing(true);await onRefresh();setTimeout(()=>setRefreshing(false),800);
    }
  };

  return(
    <div ref={scrollRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{flex:1,overflowY:"auto",padding:"10px 10px 4px",background:chatBg||th.bg,backgroundSize:"cover",backgroundPosition:"center",WebkitOverflowScrolling:"touch"}}>
      {refreshing&&<div className="ptr-spinner"><div className="spin" style={{width:16,height:16,border:"2px solid #6366f1",borderTopColor:"transparent",borderRadius:"50%"}}/>جاري التحديث...</div>}
      {msgs.length===0&&!refreshing&&empty}
      {msgs.map(m=><Bubble key={m.id||m.ts} msg={m} me={me} isGroup={isGroup} users={users} onImg={onImg} onAv={onAv} bubbleColor={bubbleColor} th={th}/>)}
      {typingUsers&&typingUsers.length>0&&(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
          {typingUsers.slice(0,2).map(u=><Av key={u} user={users[u]} size={22}/>)}
          <div style={{background:th.bubble,borderRadius:"12px 12px 12px 4px",padding:"8px 12px"}}>
            <div className="typing" style={{display:"flex",alignItems:"center",gap:2}}><span style={{background:th.text2}}/><span style={{background:th.text2}}/><span style={{background:th.text2}}/></div>
          </div>
        </div>
      )}
      <div ref={bot}/>
    </div>
  );
});

const SPAM_DELAY=1200;
const ChatInp=memo(({ph,onSend,onMedia,onTyping,th})=>{
  const[val,setVal]=useState("");const[mode,setMode]=useState("text");
  const[rec,setRec]=useState(false);const[rs,setRs]=useState(0);const[rd,setRd]=useState(null);
  const[cooldown,setCooldown]=useState(false);
  const mr=useRef(null);const tr=useRef(null);const rr=useRef(0);const typT=useRef(null);
  const ir=useRef(null);const vr=useRef(null);const lastSend=useRef(0);
  const cdTimer=useRef(null);

  const send=useCallback(()=>{
    if(!val.trim())return;
    const now=Date.now();
    if(now-lastSend.current<SPAM_DELAY){toast("لا تُرسل بسرعة كبيرة ⏳","warn");return;}
    lastSend.current=now;
    onSend(val.trim());setVal("");snd("send");onTyping?.(false);
    setCooldown(true);
    clearTimeout(cdTimer.current);
    cdTimer.current=setTimeout(()=>setCooldown(false),SPAM_DELAY);
  },[val,onSend,onTyping]);

  const onChange=e=>{
    setVal(e.target.value);
    if(onTyping){onTyping(true);clearTimeout(typT.current);typT.current=setTimeout(()=>onTyping(false),2500);}
  };
  const hImg=e=>{const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024)return toast("الحجم الأقصى 5 ميغابايت","error");const r=new FileReader();r.onload=()=>onMedia("image",r.result);r.readAsDataURL(f);e.target.value="";setMode("text");};
  const hVid=e=>{const f=e.target.files[0];if(!f)return;if(f.size>20*1024*102
